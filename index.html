<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>尾牙排座系統 V13.4 - 視覺直覺版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .grid-cell { width: 85px; height: 85px; }
        .canvas-container { display: grid; grid-template-columns: repeat(19, 85px); gap: 10px; padding: 40px; }
        
        /* 狀態動畫 */
        .status-over { border: 4px solid #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* 元素樣式 */
        .veg-table-style { background-color: #16a34a !important; border: 2px solid white !important; }
        .veg-marker { position: absolute; bottom: -4px; right: -4px; background: #22c55e; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid white; font-weight: bold; z-index: 20; }
        
        .table-id-tag { position: absolute; top: -12px; background: #1e293b; padding: 2px 10px; border-radius: 14px; font-size: 13px; color: white; z-index: 10; font-weight: bold; border: 2px solid white; }
        .modal-bg { background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        #scroll-wrapper { overflow: auto !important; height: 100vh; flex-grow: 1; }
        
        /* 待排部門卡片 - 色彩加強 */
        .dept-card { transition: all 0.2s ease; border-left-width: 8px !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex text-slate-800 overflow-hidden" oncontextmenu="return false;">

    <div class="w-96 bg-white shadow-2xl h-screen flex flex-col border-r z-50 p-5 flex-shrink-0">
        <h1 class="text-2xl font-black text-indigo-600 mb-4">尾牙排座 V13.4</h1>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="setMode('normal')" id="mode-normal" class="py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg text-sm">一般桌 (10人)</button>
            <button onclick="setMode('main')" id="mode-main" class="py-3 rounded-xl bg-white border-2 border-orange-400 text-orange-600 font-bold text-sm">主桌 (12人)</button>
        </div>

        <div class="bg-slate-100 p-1 rounded-2xl flex mb-4">
            <button id="btn-meat" onclick="setAssignType('葷')" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm text-indigo-600">排葷食</button>
            <button id="btn-veg" onclick="setAssignType('素')" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-400">排素食</button>
        </div>

        <div id="veg-global-stats" class="hidden mb-4 p-4 bg-green-600 text-white rounded-2xl">
            <div class="text-xs font-bold opacity-80 uppercase tracking-widest">全公司素食待排</div>
            <div class="text-3xl font-black"><span id="global-veg-count">0</span> <span class="text-sm font-normal">人</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="openDataModal()" class="py-2 bg-slate-800 text-white rounded-lg text-[10px] font-bold">名單/員編管理</button>
            <button onclick="exportImage()" class="py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-bold">匯出桌圖PNG</button>
        </div>

        <div class="flex-1 overflow-y-auto border-t pt-4">
            <h3 class="font-black text-slate-400 text-[10px] tracking-widest mb-3 uppercase">部門清單 (剩餘人數)</h3>
            <div id="dept-list" class="space-y-2 pb-10"></div>
        </div>
        
        <div class="pt-2 border-t flex gap-2">
            <button onclick="exportProject()" class="flex-1 py-2 border border-slate-300 rounded text-[10px]">匯出專案</button>
            <button onclick="document.getElementById('import-project').click()" class="flex-1 py-2 border border-slate-300 rounded text-[10px]">匯入專案</button>
            <input type="file" id="import-project" class="hidden" accept=".json" onchange="importProject(this)"/>
        </div>
    </div>

    <div id="scroll-wrapper" class="bg-slate-200">
        <div id="capture-area" class="min-w-max p-12">
            <div class="w-[800px] h-14 bg-slate-900 text-white flex items-center justify-center mx-auto mb-20 rounded-b-3xl font-bold text-2xl tracking-[2em] border-x-8 border-indigo-500 shadow-xl">STAGE 舞台</div>
            <div id="canvas" class="canvas-container mx-auto bg-white rounded-[40px] shadow-2xl border border-slate-300"></div>
        </div>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-96">
            <h3 class="text-xl font-black mb-4 border-b pb-2" id="modal-title"></h3>
            <div id="modal-content" class="space-y-3 mb-6 max-h-80 overflow-y-auto"></div>
            <div class="flex gap-2">
                <button onclick="saveAndCloseManage()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">儲存修改</button>
                <button onclick="closeManageModalOnly()" class="px-6 py-4 bg-slate-200 rounded-2xl font-bold">取消</button>
            </div>
        </div>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl shadow-2xl w-[90%] h-[85%] flex flex-col p-8">
            <div class="flex justify-between items-start mb-6">
                <div><h3 class="text-2xl font-black">名單數據中心</h3><p class="text-sm text-red-500 font-bold hidden" id="id-error">⚠️ 員編重複！</p></div>
                <div class="flex gap-2"><button onclick="document.getElementById('excel-upload').click()" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold">Excel 匯入</button><input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls"/><button onclick="addRow()" class="px-5 py-2 border-2 border-indigo-600 text-indigo-600 rounded-xl font-bold">＋ 新增</button><button onclick="closeDataModal()" class="px-5 py-2 bg-slate-900 text-white rounded-xl font-bold">儲存</button></div>
            </div>
            <div class="flex-1 overflow-auto border rounded-2xl"><table class="w-full text-left"><thead class="bg-slate-100 sticky top-0"><tr><th class="p-4">單位</th><th class="p-4">員編</th><th class="p-4">姓名</th><th class="p-4">飲食</th><th class="p-4 text-center">刪除</th></tr></thead><tbody id="data-table-body" class="divide-y"></tbody></table></div>
        </div>
    </div>

    <script>
        const ROWS = 12, COLS = 19, WALKWAY_COL = 10;
        let rawData = [], tables = [], deptAliases = {}, deptColors = {};
        let currentTableMode = 'normal', assignType = '葷', selectedDept = null, currentEditingTable = null;
        
        // 專業調色盤
        const PALETTE = ["#4f46e5", "#e11d48", "#8b5cf6", "#0ea5e9", "#f43f5e", "#d946ef", "#6366f1", "#06b6d4"];

        function init() {
            const saved = localStorage.getItem('tailor_v13_data');
            if(saved) {
                const d = JSON.parse(saved);
                rawData = d.rawData || []; tables = d.tables || []; deptAliases = d.deptAliases || {};
            }
            renderCanvas();
        }

        function getStats() {
            let s = {};
            rawData.forEach(d => {
                if(!s[d.dept]) {
                    s[d.dept] = { meat: 0, veg: 0 };
                    if(!deptColors[d.dept]) deptColors[d.dept] = PALETTE[Object.keys(deptColors).length % PALETTE.length];
                }
                if(String(d.diet).includes('素')) s[d.dept].veg++; else s[d.dept].meat++;
            });
            return s;
        }

        function getRemain(dName, type) {
            const stats = getStats()[dName] || { meat:0, veg:0 };
            let assigned = 0;
            tables.forEach(t => (t.assigned || []).forEach(a => { if(a.dept === dName && a.type === type) assigned += a.count; }));
            return (type === '葷' ? stats.meat : stats.veg) - assigned;
        }

        function renderCanvas() {
            tables.sort((a,b)=>a.r!==b.r?a.r-b.r:a.c-b.c);
            let n=1, m=1; tables.forEach(t=>{t.displayId=t.type==='main'?`M${m++}`:n++; t.capacity=t.type==='main'?12:10;});
            const canvas = document.getElementById('canvas'); canvas.innerHTML = '';
            
            for(let r=1; r<=ROWS; r++){
                for(let c=1; c<=COLS; c++){
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-full flex items-center justify-center relative ${c===WALKWAY_COL?'bg-slate-50':''}`;
                    const table = tables.find(t=>t.r===r && t.c===c);
                    
                    if(table){
                        const total = (table.assigned||[]).reduce((s,a)=>s+a.count,0);
                        const isVeg = (table.assigned||[]).some(a => a.type === '素');
                        const tableEl = document.createElement('div');
                        tableEl.className = `w-[75px] h-[75px] rounded-full shadow-lg flex flex-col items-center justify-center text-white transition-all cursor-pointer relative border-2 border-white`;
                        
                        // 顏色邏輯修正
                        if(isVeg) {
                            tableEl.className += " veg-table-style";
                        } else if(table.type === 'main') {
                            tableEl.style.backgroundColor = "#f97316"; // 主桌橘色
                        } else {
                            const mainDept = table.assigned.length > 0 ? table.assigned[0].dept : null;
                            tableEl.style.backgroundColor = mainDept ? deptColors[mainDept] : "#94a3b8";
                        }

                        if(total > table.capacity) tableEl.className += " status-over";
                        
                        tableEl.innerHTML = `<div class="table-id-tag">${table.displayId}</div>`;
                        (table.assigned||[]).slice(0,2).forEach(a=>{
                            const alias = deptAliases[a.dept] || a.dept.substring(0,2);
                            tableEl.innerHTML += `<div class="text-[12px] font-black leading-tight drop-shadow-md">${alias}:${a.count}</div>`;
                        });
                        if(isVeg) tableEl.innerHTML += `<div class="veg-marker">素</div>`;
                        
                        tableEl.onclick=()=>{ if(selectedDept) assignToTable(table); else openManageModal(table); };
                        tableEl.oncontextmenu=(e)=>{ e.preventDefault(); if(confirm('刪除？')) tables = tables.filter(t=>t!==table); renderCanvas(); };
                        cell.appendChild(tableEl);
                    } else {
                        // 未放置桌子的樣式修正
                        cell.className += " border border-dashed border-slate-200 hover:bg-indigo-50 cursor-pointer";
                        if(currentTableMode === 'main') {
                            // 預覽主桌橘色虛線
                            const preview = document.createElement('div');
                            preview.className = "w-12 h-12 rounded-full border-2 border-orange-400 border-dashed opacity-40";
                            cell.appendChild(preview);
                        }
                        cell.onclick=()=>{tables.push({r,c,type:currentTableMode,assigned:[]}); renderCanvas();};
                    }
                    canvas.appendChild(cell);
                }
            }
            updateGlobalVeg(); renderSidebar(); save();
        }

        function renderSidebar() {
            const list = document.getElementById('dept-list'), s = getStats();
            list.innerHTML = '';
            const sortedDepts = Object.keys(s).sort((a,b)=>getRemain(b,assignType)-getRemain(a,assignType));

            sortedDepts.forEach(d => {
                const rem = getRemain(d, assignType);
                const isSel = selectedDept===d;
                const div = document.createElement('div');
                
                // 待排清單視覺優化：直接塗上對應顏色，排完變淡
                const bgStyle = rem > 0 ? 'bg-white shadow-sm' : 'bg-slate-50 opacity-30';
                div.className = `dept-card p-3 rounded-xl border-2 cursor-pointer transition-all ${isSel?'ring-4 ring-indigo-400 scale-105 z-10':''} ${bgStyle}`;
                div.style.borderColor = rem > 0 ? "#e2e8f0" : "transparent";
                div.style.borderLeftColor = deptColors[d]; // 顯示部門顏色條
                
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-black text-slate-700">${d}</span>
                        <span class="bg-slate-100 px-2 py-1 rounded text-xs font-mono">${rem} 人</span>
                    </div>
                    <div class="text-[10px] mt-1 font-bold" style="color:${deptColors[d]}">標籤: ${deptAliases[d]||d.substring(0,2)}</div>
                `;
                
                div.onclick=()=>{ if(rem>0) {selectedDept=(selectedDept===d?null:d); renderSidebar();}};
                div.oncontextmenu=(e)=>{ e.preventDefault(); const a=prompt(`簡稱:`, deptAliases[d]||d.substring(0,2)); if(a) deptAliases[d]=a; renderCanvas(); };
                list.appendChild(div);
            });
        }

        function updateGlobalVeg() {
            let total = 0; Object.keys(getStats()).forEach(d => total += getRemain(d, '素'));
            document.getElementById('global-veg-count').innerText = total;
        }

        function openManageModal(t){
            currentEditingTable = t;
            const isVeg = (t.assigned||[]).some(a=>a.type==='素');
            document.getElementById('modal-title').innerHTML = `管理桌位 ${t.displayId} ${isVeg?'(素)':''}`;
            const c = document.getElementById('modal-content'); c.innerHTML = '';
            t.assigned.forEach((a,i)=>{
                const d = document.createElement('div'); d.className="p-3 bg-slate-100 rounded-xl flex justify-between items-center mb-2";
                d.innerHTML = `<span class="font-bold text-xs" style="color:${deptColors[a.dept]}">${a.dept}</span> 
                    <div class="flex items-center">
                    <input type="number" value="${a.count}" class="w-16 p-1 border rounded text-center font-bold" onchange="currentEditingTable.assigned[${i}].count=parseInt(this.value)">
                    <button onclick="currentEditingTable.assigned.splice(${i},1);openManageModal(currentEditingTable)" class="ml-2 text-red-500">✕</button></div>`;
                c.appendChild(d);
            });
            document.getElementById('manage-modal').classList.remove('hidden');
        }

        function saveAndCloseManage() { document.getElementById('manage-modal').classList.add('hidden'); renderCanvas(); }
        function closeManageModalOnly() { document.getElementById('manage-modal').classList.add('hidden'); }

        // --- 核心工具 (與前版一致) ---
        function setMode(m){ 
            currentTableMode=m;
            document.getElementById('mode-normal').className=m==='normal'?'py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg text-sm':'py-3 rounded-xl bg-white border-2 border-slate-200 text-slate-600 font-bold text-sm';
            document.getElementById('mode-main').className=m==='main'?'py-3 rounded-xl bg-orange-500 text-white font-bold shadow-lg text-sm':'py-3 rounded-xl bg-white border-2 border-orange-400 text-orange-600 font-bold text-sm';
            renderCanvas();
        }
        function setAssignType(t){ 
            assignType=t; selectedDept=null;
            document.getElementById('veg-global-stats').classList.toggle('hidden', t!=='素');
            document.getElementById('btn-meat').className = t==='葷'?'flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm text-indigo-600':'flex-1 py-3 rounded-xl text-sm font-bold text-slate-400';
            document.getElementById('btn-veg').className = t==='素'?'flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm text-green-600':'flex-1 py-3 rounded-xl text-sm font-bold text-slate-400';
            renderSidebar(); 
        }
        function save(){ localStorage.setItem('tailor_v13_data', JSON.stringify({rawData, tables, deptAliases})); }
        function exportProject() { const blob = new Blob([JSON.stringify({rawData, tables, deptAliases})], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `尾牙專案.json`; a.click(); }
        function importProject(input) { const reader = new FileReader(); reader.onload = (e) => { const d = JSON.parse(e.target.result); rawData = d.rawData; tables = d.tables; deptAliases = d.deptAliases; renderCanvas(); }; reader.readAsText(input.files[0]); }
        function assignToTable(t) {
            const isVeg = (t.assigned||[]).some(a=>a.type==='素'), isMeat = (t.assigned||[]).some(a=>a.type==='葷');
            if((assignType==='素'&&isMeat) || (assignType==='葷'&&isVeg)) return alert("素食與葷食不可併桌！");
            const rem = getRemain(selectedDept, assignType);
            const countStr = prompt(`分配 ${selectedDept} 到第 ${t.displayId} 桌（剩餘 ${rem} 人）`, rem);
            const count = parseInt(countStr);
            if(count > 0) {
                const ex = t.assigned.find(a=>a.dept===selectedDept && a.type===assignType);
                if(ex) ex.count += count; else t.assigned.push({dept:selectedDept, count, type:assignType});
                selectedDept = null; renderCanvas();
            }
        }
        function exportImage() { html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => { const a = document.createElement('a'); a.download = `尾牙桌圖.png`; a.href = canvas.toDataURL(); a.click(); }); }
        function openDataModal(){ document.getElementById('data-modal').classList.remove('hidden'); renderDataTable(); }
        function closeDataModal(){ document.getElementById('data-modal').classList.add('hidden'); renderCanvas(); }
        function addRow(){ rawData.unshift({dept:'新部門',id:'',name:'新同仁',diet:'葷'}); renderDataTable(); }
        function renderDataTable() {
            const tbody = document.getElementById('data-table-body'); tbody.innerHTML = '';
            rawData.forEach((item, index) => {
                const isDup = rawData.some((v, i) => v.id && v.id === item.id && i !== index);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-2"><input class="w-full border-b" value="${item.dept}" onchange="rawData[${index}].dept=this.value;renderDataTable()"></td><td class="p-2"><input class="w-full border-b ${isDup?'text-red-600 bg-red-50':''}" value="${item.id}" onchange="rawData[${index}].id=this.value;renderDataTable()"></td><td class="p-2"><input class="w-full border-b" value="${item.name}" onchange="rawData[${index}].name=this.value"></td><td class="p-2"><input class="w-full border-b" value="${item.diet}" onchange="rawData[${index}].diet=this.value;renderDataTable()"></td><td class="p-2 text-center"><button onclick="rawData.splice(${index},1);renderDataTable()" class="text-red-400">✕</button></td>`;
                tbody.appendChild(tr);
            });
        }
        document.getElementById('excel-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).SheetNames[0]], {header:1});
                for(let i=1; i<rows.length; i++){
                    const r = rows[i]; if(!r || r.length<4) continue;
                    rawData.push({ dept: String(r[0]||'未分類'), group: String(r[1]||''), id: String(r[2]||''), name: String(r[3]||''), diet: String(r[4]||'葷') });
                }
                save(); renderCanvas();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
        init();
    </script>
</body>
</html>
