<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - V4 動態管理版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .grid-cell { width: 55px; height: 55px; }
        .walkway-bg { background-color: #f1f5f9; } /* 窄化走道色 */
        .canvas-container { 
            display: grid; 
            grid-template-columns: repeat(20, 55px);
            gap: 6px;
            padding: 20px;
        }
        .dragging { opacity: 0.5; transform: scale(1.1); }
        .drop-target { border: 2px solid #3b82f6 !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex select-none">

    <div class="w-80 bg-white shadow-2xl h-screen sticky top-0 p-6 flex flex-col border-r z-50">
        <h2 class="text-xl font-bold mb-4 text-slate-800">尾牙配置系統</h2>
        
        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="bg-blue-50 p-2 rounded-lg text-center border border-blue-100">
                <div class="text-[10px] text-blue-500 font-bold uppercase">一般桌</div>
                <div id="count-normal" class="text-xl font-black text-blue-700">0</div>
            </div>
            <div class="bg-amber-50 p-2 rounded-lg text-center border border-amber-100">
                <div class="text-[10px] text-amber-500 font-bold uppercase">主桌</div>
                <div id="count-main" class="text-xl font-black text-amber-700">0</div>
            </div>
        </div>

        <div class="space-y-2 mb-6">
            <p class="text-xs text-slate-400 font-bold">1. 選擇類型 (點擊空白格放置)</p>
            <div class="flex gap-2">
                <button id="mode-normal" onclick="setMode('normal')" class="flex-1 py-2 rounded bg-blue-600 text-white text-sm font-bold shadow-md">一般桌</button>
                <button id="mode-main" onclick="setMode('main')" class="flex-1 py-2 rounded bg-white border border-slate-200 text-slate-600 text-sm font-bold">主桌</button>
            </div>
        </div>

        <div class="border-t pt-4 mb-4">
            <p class="text-xs text-slate-400 font-bold mb-2">2. 匯入名單</p>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" class="block w-full text-xs text-slate-400 file:mr-3 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-slate-100 cursor-pointer"/>
        </div>

        <div id="dept-area" class="flex-1 overflow-y-auto hidden">
            <h3 class="font-bold text-slate-700 text-sm mb-3">待分配單位</h3>
            <div id="dept-list" class="space-y-1"></div>
        </div>
        
        <p class="text-[10px] text-slate-400 mt-4 leading-relaxed">
            💡 操作提示：<br>
            • 單擊空格：放置桌子<br>
            • 拖曳桌子：移動或與他桌交換<br>
            • 雙擊桌子：刪除桌子
        </p>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200/30">
        <div class="min-w-max p-10">
            <div class="w-[500px] h-12 bg-slate-800 text-white flex items-center justify-center mx-auto mb-16 rounded-b-2xl shadow-xl font-bold tracking-[1.5em]">STAGE 舞台</div>
            <div id="canvas" class="canvas-container mx-auto bg-white rounded-2xl shadow-sm border border-slate-200"></div>
        </div>
    </div>

    <script>
        const COLS = 20;
        const ROWS = 15;
        const WALKWAY_COL = 11; // 窄化走道至一排
        let currentMode = 'normal';
        let tables = JSON.parse(localStorage.getItem('v4_tables')) || [];
        let deptStats = {}; // { '單位': { count: 0, groups: { '組別': count } } }
        let selectedPath = { dept: null, group: null };
        let draggedTable = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-normal').className = mode === 'normal' ? 'flex-1 py-2 rounded bg-blue-600 text-white text-sm font-bold shadow-md' : 'flex-1 py-2 rounded bg-white border border-slate-200 text-slate-600 text-sm font-bold';
            document.getElementById('mode-main').className = mode === 'main' ? 'flex-1 py-2 rounded bg-amber-500 text-white text-sm font-bold shadow-md' : 'flex-1 py-2 rounded bg-white border border-slate-200 text-slate-600 text-sm font-bold';
        }

        // 自動排序並編號
        function sortAndNumberTables() {
            // 先按 row 排序，再按 col 排序
            tables.sort((a, b) => a.r !== b.r ? a.r - b.r : a.c - b.c);
            tables.forEach((t, index) => {
                if (t.type === 'normal') t.displayId = index + 1;
                else t.displayId = '主';
            });
        }

        function renderCanvas() {
            sortAndNumberTables();
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            let normalCount = 0;
            let mainCount = 0;

            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const cell = document.createElement('div');
                    const table = tables.find(t => t.r === r && t.c === c);

                    cell.className = `grid-cell rounded-full flex items-center justify-center relative border border-slate-50 `;
                    if (c === WALKWAY_COL) cell.classList.add('walkway-bg');

                    if (table) {
                        const isMain = table.type === 'main';
                        if (isMain) mainCount++; else normalCount++;
                        
                        const tableEl = document.createElement('div');
                        tableEl.draggable = true;
                        tableEl.className = `w-11 h-11 rounded-full shadow-md flex items-center justify-center text-[10px] font-black cursor-move transition-transform active:scale-95 
                            ${isMain ? 'bg-amber-400 text-amber-900 ring-2 ring-amber-100' : 'bg-blue-500 text-white'}`;
                        tableEl.innerText = table.displayId;

                        // 拖拉事件
                        tableEl.ondragstart = (e) => { draggedTable = table; e.target.classList.add('dragging'); };
                        tableEl.ondragend = (e) => { e.target.classList.remove('dragging'); draggedTable = null; renderCanvas(); };
                        
                        // 雙擊刪除
                        tableEl.ondblclick = (e) => {
                            e.stopPropagation();
                            if (confirm(`確定要刪除這張桌子嗎？`)) {
                                tables = tables.filter(t => t !== table);
                                renderCanvas();
                            }
                        };

                        // 分配點擊
                        tableEl.onclick = (e) => {
                            e.stopPropagation();
                            if (selectedPath.dept) assignToTable(table);
                        };

                        cell.appendChild(tableEl);
                    } else {
                        cell.onclick = () => {
                            tables.push({ r, c, type: currentMode, assigned: [] });
                            renderCanvas();
                        };
                    }

                    // 放置目標事件
                    cell.ondragover = (e) => e.preventDefault();
                    cell.ondragenter = (e) => cell.classList.add('drop-target');
                    cell.ondragleave = (e) => cell.classList.remove('drop-target');
                    cell.ondrop = (e) => {
                        cell.classList.remove('drop-target');
                        if (!draggedTable) return;
                        
                        const targetTable = tables.find(t => t.r === r && t.c === c);
                        if (targetTable) {
                            // 交換位置
                            const tempR = draggedTable.r;
                            const tempC = draggedTable.c;
                            draggedTable.r = r;
                            draggedTable.c = c;
                            targetTable.r = tempR;
                            targetTable.c = tempC;
                        } else {
                            // 移動到空位
                            draggedTable.r = r;
                            draggedTable.c = c;
                        }
                        renderCanvas();
                    };

                    canvas.appendChild(cell);
                }
            }
            document.getElementById('count-normal').innerText = normalCount;
            document.getElementById('count-main').innerText = mainCount;
            localStorage.setItem('v4_tables', JSON.stringify(tables));
        }

        // Excel 兩階段處理
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                processExcel(raw);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function processExcel(raw) {
            deptStats = {};
            raw.forEach(item => {
                const d = item['單位'];
                const g = item['組別'] || '其他';
                if (!deptStats[d]) deptStats[d] = { total: 0, groups: {} };
                if (!deptStats[d].groups[g]) deptStats[d].groups[g] = 0;
                deptStats[d].total++;
                deptStats[d].groups[g]++;
            });
            document.getElementById('dept-area').classList.remove('hidden');
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('dept-list');
            list.innerHTML = '';
            
            Object.keys(deptStats).forEach(deptName => {
                const dept = deptStats[deptName];
                const isDeptSelected = selectedPath.dept === deptName;
                
                const deptDiv = document.createElement('div');
                deptDiv.className = `p-2 rounded cursor-pointer border mb-1 transition-all ${isDeptSelected ? 'bg-slate-800 text-white' : 'bg-white hover:border-blue-300'}`;
                deptDiv.innerHTML = `<div class="flex justify-between text-xs font-bold"><span>${deptName}</span><span>${dept.total}人</span></div>`;
                
                deptDiv.onclick = () => {
                    selectedPath.dept = isDeptSelected ? null : deptName;
                    selectedPath.group = null;
                    renderSidebar();
                };

                list.appendChild(deptDiv);

                // 如果選中單位，顯示組別
                if (isDeptSelected) {
                    const groupContainer = document.createElement('div');
                    groupContainer.className = "ml-4 mb-2 border-l-2 border-slate-200 pl-2 space-y-1";
                    Object.keys(dept.groups).forEach(groupName => {
                        const count = dept.groups[groupName];
                        const isGroupSelected = selectedPath.group === groupName;
                        const gDiv = document.createElement('div');
                        gDiv.className = `p-1.5 text-[10px] rounded border cursor-pointer ${isGroupSelected ? 'bg-blue-500 text-white' : 'bg-white text-slate-600'}`;
                        gDiv.innerText = `${groupName} (${count}人)`;
                        gDiv.onclick = (e) => {
                            e.stopPropagation();
                            selectedPath.group = isGroupSelected ? null : groupName;
                            renderSidebar();
                        };
                        groupContainer.appendChild(gDiv);
                    });
                    list.appendChild(groupContainer);
                }
            });
        }

        function assignToTable(table) {
            const dept = selectedPath.dept;
            const group = selectedPath.group;
            if (!dept) return;

            const label = group ? `${dept}-${group}` : dept;
            const count = prompt(`分配 [${label}] 到桌號 ${table.displayId}，請輸入人數：`, group ? deptStats[dept].groups[group] : deptStats[dept].total);
            
            if (count > 0) {
                if (!table.assigned) table.assigned = [];
                table.assigned.push({ label, count: parseInt(count) });
                renderCanvas();
                alert(`已分配 ${count} 人`);
            }
        }

        renderCanvas();
    </script>
</body>
</html>
