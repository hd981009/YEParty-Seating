<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>貿協交流餐會桌位 V13.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .grid-cell { width: 85px; height: 85px; }
        .canvas-container { display: grid; grid-template-columns: repeat(19, 85px); gap: 10px; padding: 40px; width: max-content; }
        .status-over { border: 4px solid #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .veg-table-style { background-color: #16a34a !important; border: 2px solid white !important; }
        .veg-marker { position: absolute; bottom: -4px; right: -4px; background: #22c55e; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid white; font-weight: bold; z-index: 20; }
        .table-id-tag { 
    position: absolute; 
    top: -12px; 
    left: 50%; /* 新增：鎖定水平中心 */
    transform: translateX(-50%); /* 新增：精準置中 */
    background: #1e293b; 
    padding: 2px 10px; 
    border-radius: 14px; 
    font-size: 13px; 
    color: white; 
    z-index: 10; 
    font-weight: bold; 
    border: 2px solid white; 
    white-space: nowrap; /* 新增：防止文字換行造成偏移 */
}
        .modal-bg { background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        #scroll-wrapper { overflow: auto !important; height: 100vh; flex-grow: 1; }
        .stage-container { width: 100%; display: flex; justify-content: center; margin-bottom: 2rem; }
        .btn-active-indigo { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .btn-active-orange { background-color: #fed33c !important; color: white !important; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4); }
        .btn-active-green { background-color: #16a34a !important; color: white !important; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4); }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex text-slate-800 overflow-hidden" oncontextmenu="return false;">

    <div class="w-96 bg-white shadow-2xl h-screen flex flex-col border-r z-50 p-5 flex-shrink-0">
        <h1 class="text-2xl font-black text-indigo-600 mb-4 tracking-tighter">尾牙排座系統 V13.7</h1>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="setMode('normal')" id="mode-normal" class="py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-base transition-all btn-active-indigo">一般桌 (10人)</button>
            <button onclick="setMode('main')" id="mode-main" class="py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-base transition-all">主桌 (12人)</button>
        </div>

        <div class="bg-slate-100 p-1 rounded-2xl flex mb-4">
            <button id="btn-meat" onclick="setAssignType('葷')" class="flex-1 py-3 rounded-xl text-base font-bold transition-all btn-active-indigo">排葷食</button>
            <button id="btn-veg" onclick="setAssignType('素')" class="flex-1 py-3 rounded-xl text-base font-bold text-slate-400 transition-all">排素食</button>
        </div>

        <div class="flex-1 overflow-y-auto border-t pt-4">
            <div class="flex justify-between items-end mb-3">
                <h3 class="font-black text-slate-400 text-base tracking-widest uppercase">待排部門</h3>
                <span id="global-stats" class="text-sm font-bold text-indigo-500"></span>
            </div>
            <div id="dept-list" class="space-y-3 pb-10 text-lg"></div>
        </div>

        <div class="pt-4 border-t grid grid-cols-2 gap-2">
            <button onclick="openDataModal()" class="py-3 bg-slate-800 text-white rounded-xl text-sm font-bold shadow-md">名單數據中心</button>
            <button onclick="exportImage()" class="py-3 bg-emerald-600 text-white rounded-xl text-sm font-bold shadow-md">匯出桌圖PNG</button>
            <button onclick="exportProject()" class="py-2 border border-slate-200 rounded text-xs text-slate-400">儲存專案</button>
            <button onclick="document.getElementById('import-project').click()" class="py-2 border border-slate-200 rounded text-xs text-slate-400">讀取專案</button>
            <input type="file" id="import-project" class="hidden" onchange="importProject(this)">
        </div> 
    </div>

    <div id="scroll-wrapper" class="bg-slate-200 flex-grow">
        <div id="capture-area" class="p-12 w-fit mx-auto">
            <div class="stage-container">
                <div class="w-[800px] h-14 bg-slate-900 text-white flex items-center justify-center rounded-b-3xl font-bold text-2xl tracking-[2em] border-x-8 border-indigo-500 shadow-xl">STAGE 舞台</div>
            </div>
            <div id="canvas" class="canvas-container bg-white rounded-[40px] shadow-2xl border border-slate-300 mx-auto"></div>
        </div>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl shadow-2xl w-[95%] h-[85%] flex flex-col p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 class="text-2xl font-black">名單數據中心 (欄位必須一致)</h3>
                    <p class="text-sm text-red-500 font-bold hidden" id="id-error">⚠️ 員編重複！請修正後再存檔。</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('excel-upload').click()" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold text-sm">Excel 匯入</button>
                    <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls"/>
                    <button onclick="addRow()" class="px-5 py-2 border-2 border-indigo-600 text-indigo-600 rounded-xl font-bold text-sm">＋ 新增人員</button>
                    <div class="w-px h-10 bg-slate-200 mx-2"></div>
                    <button onclick="closeDataModal()" id="save-data-btn" class="px-8 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm">儲存</button>
                    <button onclick="cancelDataChanges()" class="px-5 py-2 bg-slate-200 text-slate-600 rounded-xl font-bold text-sm">取消</button>
                </div>
            </div>

            <div class="flex-1 overflow-auto border rounded-2xl">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 sticky top-0 font-bold text-sm text-slate-600">
                        <tr>
                            <th class="p-4 border-r">單位 (部門)</th>
                            <th class="p-4 border-r">組別</th>
                            <th class="p-4 border-r">員編</th>
                            <th class="p-4 border-r">姓名</th>
                            <th class="p-4 border-r">飲食選擇</th>
                            <th class="p-4 text-center">刪除</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="divide-y"></tbody>
                </table>
            </div> 

            <div class="mt-6 flex justify-end items-center gap-3">
                <span class="text-base text-slate-400 mr-auto font-medium">* 匯出 Excel 可作為備份使用，清除資料前請務必確認。</span>
                <button onclick="exportExcelList()" class="px-6 py-2.5 bg-white border-2 border-emerald-500 text-emerald-600 rounded-xl font-bold text-sm hover:bg-emerald-50 transition-all">匯出名單Excel</button>
                <button onclick="clearAllData()" class="px-6 py-2.5 bg-red-50 text-red-600 rounded-xl font-bold text-sm hover:bg-red-600 hover:text-white transition-all">清除所有名單</button>
            </div>
        </div>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-96">
            <h3 class="text-xl font-black mb-4 border-b pb-2" id="modal-title">管理桌位</h3>
            <div id="modal-content" class="space-y-3 mb-6 max-h-80 overflow-y-auto"></div>
            <button onclick="saveAndCloseManage()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">關閉管理窗</button>
        </div>
    </div>

    <script>
        const ROWS = 12, COLS = 19, WALKWAY_COL = 10;
        let rawData = [], tables = [], deptAliases = {}, deptOrder = []; 
        let tempRawData = [], backupTables = []; 
        let currentTableMode = 'normal', assignType = '葷', selectedDept = null, draggedTable = null;

// 擴充至 25 種精選顏色 (包含深淺層次，確保視覺辨識度)
const PALETTE = [
    "#86AFE6", "#7AABCC", "#FE6F61", "#BE64CA", "#949597", 
    "#F4C220", "#45B5A9", "#8B8CBF", "#AD5D98", "#F7C9C9", 
    "#DECCBE", "#94D0CF", "#008AF2", "#BC2649", "#9ABE66", 
    "#B48A5C", "#4C2A6E", "#1568B3", "#E0728C", "#06AA41", 
    "#156082", "#3D4C5B", "#4F6A2E", "#666432", "#9A0000"
];

// 新增一個顏色分配函數：根據字串產生固定的顏色索引
function getDeptColor(deptName) {
    if (!deptName) return "#94a3b8";
    let hash = 0;
    for (let i = 0; i < deptName.length; i++) {
        hash = deptName.charCodeAt(i) + ((hash << 5) - hash);
    }
    const index = Math.abs(hash) % PALETTE.length;
    return PALETTE[index];
}

// 修正後的 init: 確保所有資料都能正確讀取
function init() {
    const saved = localStorage.getItem('tailor_v13_data');
    if(saved) {
        const d = JSON.parse(saved);
        rawData = d.rawData || []; 
        tables = d.tables || []; 
        deptAliases = d.deptAliases || {};
        deptOrder = d.deptOrder || []; 
    }
    renderCanvas(); // renderCanvas 會連帶觸發 renderSidebar
}

function getStats() {
    let s = {};
    rawData.forEach(d => {
        if (!d.dept) return;
        if (!s[d.dept]) s[d.dept] = { meat: 0, veg: 0 };
        if (String(d.diet).includes('素')) s[d.dept].veg++; 
        else s[d.dept].meat++;
    });
    return s;
}

// 緊接著下一段函數
function getRemain(dName, type) {
    const stats = getStats()[dName] || { meat: 0, veg: 0 };
    let assigned = 0;
    tables.forEach(t => (t.assigned || []).forEach(a => { 
        if (a.dept === dName && a.type === type) assigned += a.count; 
    }));
    return (type === '葷' ? stats.meat : stats.veg) - assigned;
}

        function openDataModal() {
            tempRawData = JSON.parse(JSON.stringify(rawData)); 
            backupTables = JSON.parse(JSON.stringify(tables)); 
            document.getElementById('data-modal').classList.remove('hidden');
            renderDataTable();
        }

        function cancelDataChanges() {
            tables = JSON.parse(JSON.stringify(backupTables)); 
            tempRawData = []; 
            document.getElementById('data-modal').classList.add('hidden');
            renderCanvas();
        }

        function clearAllData() {
            if (confirm("⚠️ 注意：這將會刪除名單並清空所有桌位分配！")) {
                tempRawData = []; 
                tables.forEach(t => { t.assigned = []; });
                renderDataTable(); renderCanvas();
            }
        }

        function closeDataModal() {
            let ids = tempRawData.map(r => r.id).filter(id => id !== "");
            if(ids.some((id, index) => ids.indexOf(id) !== index)) return alert("員編有重複！");
            rawData = JSON.parse(JSON.stringify(tempRawData));
            document.getElementById('data-modal').classList.add('hidden');
            save(); renderCanvas();
        }

        function renderDataTable() {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            let ids = tempRawData.map(r => r.id);
            let hasDup = false;
            tempRawData.forEach((item, index) => {
                const isDup = item.id && ids.filter(x => x === item.id).length > 1;
                if(isDup) hasDup = true;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2"><input class="w-full border-b p-1" value="${item.dept||''}" onchange="tempRawData[${index}].dept=this.value"></td>
                    <td class="p-2"><input class="w-full border-b p-1" value="${item.group||''}" onchange="tempRawData[${index}].group=this.value"></td>
                    <td class="p-2"><input class="w-full border-b p-1 font-bold ${isDup?'text-red-600 bg-red-50':''}" value="${item.id||''}" onchange="tempRawData[${index}].id=this.value;renderDataTable()"></td>
                    <td class="p-2"><input class="w-full border-b p-1" value="${item.name||''}" onchange="tempRawData[${index}].name=this.value"></td>
                    <td class="p-2"><input class="w-full border-b p-1" value="${item.diet||''}" placeholder="葷/素" onchange="tempRawData[${index}].diet=this.value"></td>
                    <td class="p-2 text-center"><button onclick="tempRawData.splice(${index},1);renderDataTable()" class="text-red-400">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('id-error').classList.toggle('hidden', !hasDup);
        }

        function addRow() { tempRawData.unshift({ dept: '', group: '', id: '', name: '', diet: '葷' }); renderDataTable(); }

        function renderCanvas() {
            tables.sort((a,b)=>a.r!==b.r?a.r-b.r:a.c-b.c);
            let n=1, m=1; 
            tables.forEach(t=>{ t.displayId=t.type==='main'?`M${m++}`:n++; t.capacity=t.type==='main'?12:10; });
            
            const canvas = document.getElementById('canvas'); 
            canvas.innerHTML = '';

            for(let r=1; r<=ROWS; r++){
                for(let c=1; c<=COLS; c++){
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-full flex items-center justify-center relative ${c===WALKWAY_COL?'bg-slate-50':''}`;
                    cell.ondragover = (e) => e.preventDefault();
                    cell.ondrop = () => handleDrop(r, c);
                    
                    const table = tables.find(t=>t.r===r && t.c===c);
                    
                    if(table){
                        const total = (table.assigned || []).reduce((s,a)=>s+a.count, 0);
                        const isOver = total > table.capacity; // 判斷是否人數爆滿
                        const isVeg = (table.assigned || []).some(a => a.type === '素');
                        const hasPeople = total > 0;
                        
                        const tableEl = document.createElement('div');
                        tableEl.draggable = true;
                        
                        // 基礎樣式與紅框 (status-over) 判斷
                        tableEl.className = `w-[75px] h-[75px] rounded-full shadow-lg flex flex-col items-center justify-center text-white cursor-move relative border-2 border-white transition-all overflow-visible ${isVeg ? 'veg-table-style' : ''} ${isOver ? 'status-over' : ''}`;
                        
                        // 顏色邏輯修正：主桌固定為橘黃色，一般桌空桌為灰色
                        if(!isVeg) {
                         if (table.type === 'main') {
        tableEl.style.backgroundColor = "#fbbf24"; // 主桌專用橘黃色
    } else if (!hasPeople) {
        tableEl.style.backgroundColor = "#cbd5e1"; // 一般空桌顯示灰色
    } else {
        // --- 核心修正處 ---
        // 1. 檢查是否有手動選定的 primaryDept，且該部門是否還在這一桌的名單內
        const primaryExists = table.assigned.some(a => a.dept === table.primaryDept && a.count > 0);
        
        // 2. 決定要抓哪一個單位的顏色：有手動選定就用手動的，沒有就抓第一筆
        const targetDept = primaryExists ? table.primaryDept : table.assigned[0].dept;
        
        tableEl.style.backgroundColor = getDeptColor(targetDept);
    }
                        }

                        // 顯示桌號標籤
                        tableEl.innerHTML = `<div class="table-id-tag">${table.displayId}</div>`;

                        // --- 顯示分配內容（V13.8 強化垂直置中版） ---
const assignedList = (table.assigned || []).filter(a => a.count > 0);
const deptCount = assignedList.length;

// 1. 動態字體與行高設定
let fontSize = "13px";
let lineHeight = "1.2";
let marginTop = "0px"; // 預設不偏移

if (deptCount === 3) {
    fontSize = "11px";
    lineHeight = "1.1";
    marginTop = "2px";  // 3行時稍微下壓，避免撞到黑色標籤
} else if (deptCount >= 4) {
    fontSize = "9px";
    lineHeight = "1.0";
    marginTop = "5px";  // 4行時內容較多，強制下壓 5px 確保視覺置中
}

// 2. 建立一個包裹容器來統一控制垂直位置
const contentWrapper = document.createElement('div');
contentWrapper.style.marginTop = marginTop;
contentWrapper.className = "flex flex-col items-center justify-center w-full";

assignedList.forEach(a => {
    contentWrapper.innerHTML += `
        <div style="font-size: ${fontSize}; line-height: ${lineHeight};" 
             class="font-black drop-shadow-md whitespace-nowrap">
            ${deptAliases[a.dept] || a.dept.substring(0, 2)}:${a.count}
        </div>`;
});

tableEl.appendChild(contentWrapper);

                        if(isVeg) tableEl.innerHTML += `<div class="veg-marker">素</div>`;
                        
                        tableEl.onclick=()=>{ 
                            if(selectedDept) assignToTable(table); 
                            else openManageModal(table); 
                        };

                        tableEl.oncontextmenu=(e)=>{ e.preventDefault(); if(confirm('刪除桌位？')) { tables=tables.filter(t=>t!==table); renderCanvas(); } };
                        tableEl.ondragstart = () => { draggedTable = table; tableEl.style.opacity = "0.4"; };
                        tableEl.ondragend = () => { draggedTable = null; renderCanvas(); };
                        cell.appendChild(tableEl);
                    } else {
                        cell.className += " border border-dashed border-slate-200 hover:bg-indigo-50 cursor-pointer";
                        cell.onclick=()=>{ tables.push({r,c,type:currentTableMode,assigned:[]}); renderCanvas(); };
                    }
                    canvas.appendChild(cell);
                }
            }
            renderSidebar(); save();
        }

        function handleDrop(r, c) {
            if(!draggedTable) return;
            const target = tables.find(t => t.r === r && t.c === c);
            if(target){ const oR = draggedTable.r, oC = draggedTable.c; draggedTable.r = r; draggedTable.c = c; target.r = oR; target.c = oC; }
            else { draggedTable.r = r; draggedTable.c = c; }
            renderCanvas();
        }

       function renderSidebar() {
    const list = document.getElementById('dept-list'), s = getStats(), depts = Object.keys(s);
    list.innerHTML = '';
    
    let currentOrder = deptOrder.filter(d => depts.includes(d));
    depts.forEach(d => { if(!currentOrder.includes(d)) currentOrder.push(d); });
    deptOrder = currentOrder;

    deptOrder.forEach((d, index) => {
        const rem = getRemain(d, assignType);
        const isSel = selectedDept === d;
        const color = getDeptColor(d); // 直接取得固定顏色
        
        const div = document.createElement('div');
        div.draggable = true;
        div.className = `p-4 rounded-2xl border-2 cursor-pointer transition-all border-l-[12px] flex items-center justify-between font-black relative ${isSel?'ring-4 ring-indigo-500 ':''} ${rem>0?'bg-white shadow-md border-slate-200':'bg-slate-50 opacity-30 border-transparent text-slate-400'}`;
        div.style.borderLeftColor = color; // 使用自動分配的顏色
        
        // 拖拽排序
        div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', index); div.style.opacity = "0.4"; };
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => {
            e.preventDefault();
            const fromIdx = e.dataTransfer.getData('text/plain');
            const movedItem = deptOrder.splice(fromIdx, 1)[0];
            deptOrder.splice(index, 0, movedItem);
            save(); renderSidebar();
        };
        div.ondragend = () => div.style.opacity = "1";

        // 文字內容 (移除了點擊換色的 colorStrip)
        div.innerHTML = `<span>${d}</span><span class="bg-slate-100 px-3 py-1 rounded-lg text-indigo-600">${rem} 人</span>`;
        
        // 部門選取
        div.onclick = () => { if(rem > 0) { selectedDept = (selectedDept === d ? null : d); renderSidebar(); } };
        
        // --- 右鍵修改簡稱與顏色 ---
div.oncontextmenu = (e) => {
    e.preventDefault();
    
    // 1. 先改簡稱
    const newAlias = prompt(`設定「${d}」簡稱`, deptAliases[d] || d.substring(0, 2));
    if (newAlias === null) return; // 使用者按取消就停止
    deptAliases[d] = newAlias;

    // 2. 再改顏色：利用一個隱藏的 input color 來觸發
    const colorPicker = document.createElement('input');
    colorPicker.type = 'color';
    // 預設值抓取目前的顏色
    colorPicker.value = getDeptColor(d); 
    
    colorPicker.onchange = () => {
        const newColor = colorPicker.value;
        // 將自定義顏色存入一個新的全域變數 customDeptColors
        if(!window.customDeptColors) window.customDeptColors = {};
        window.customDeptColors[d] = newColor;
        
        save();         // 儲存設定
        renderCanvas(); // 立即重新渲染桌圖與側邊欄
    };
    
    colorPicker.click(); // 自動觸發點擊，打開系統顏色盤
};

    let totalRem = 0; Object.keys(s).forEach(d => totalRem += getRemain(d, assignType));
    document.getElementById('global-stats').innerText = `${assignType}食待排：${totalRem} 人`;
}

        function save(){ 
            localStorage.setItem('tailor_v13_data', JSON.stringify({ rawData, tables, deptAliases, deptOrder })); 
        }

        function openManageModal(t) {
    document.getElementById('modal-title').innerText = `管理 ${t.displayId} 號桌`;
    const c = document.getElementById('modal-content'); 
    c.innerHTML = '<p class="text-xs text-slate-400 mb-2">💡 點擊部門名稱可切換桌子代表色</p>';
    
    t.assigned = (t.assigned || []).filter(a => a.count > 0);
    
    t.assigned.forEach((a, i) => {
        const itemDiv = document.createElement('div');
        // 判斷是否為目前選定的主色，若是則加強邊框
        const isPrimary = (t.primaryDept === a.dept) || (!t.primaryDept && i === 0);
        
        itemDiv.className = `p-3 border-2 rounded-xl flex justify-between items-center mb-2 font-bold cursor-pointer transition-all ${isPrimary ? 'border-indigo-600 bg-indigo-50' : 'bg-white border-slate-100 opacity-70'}`;
        
        // 點擊整列即可切換主色
        itemDiv.onclick = () => {
            t.primaryDept = a.dept; 
            openManageModal(t); // 重新刷一下 Modal 顯示選中狀態
        };

        const label = document.createElement('div');
        label.className = "flex items-center gap-2";
        label.innerHTML = `
            <div class="w-4 h-4 rounded-full" style="background-color:${getDeptColor(a.dept)}"></div>
            <span class="text-sm">${a.dept} (${a.type})</span>
        `;

        const input = document.createElement('input');
        input.type = "number"; 
        input.value = a.count; 
        input.className = "w-16 border rounded text-center font-bold px-1";
        // 防止輸入時觸發父層的 onclick
        input.onclick = (e) => e.stopPropagation();
        input.onchange = () => { t.assigned[i].count = parseInt(input.value) || 0; };
        
        itemDiv.appendChild(label);
        itemDiv.appendChild(input);
        c.appendChild(itemDiv);
    });
    document.getElementById('manage-modal').classList.remove('hidden');
}
        function saveAndCloseManage() {
            document.getElementById('manage-modal').classList.add('hidden');
            renderCanvas();
        }

        function setMode(m) { currentTableMode = m; document.getElementById('mode-normal').classList.toggle('btn-active-indigo', m==='normal'); document.getElementById('mode-main').classList.toggle('btn-active-orange', m==='main'); }
        function setAssignType(t) { 
    assignType = t; 
    selectedDept = null; 
    
    // 更新按鈕樣式
    document.getElementById('btn-meat').classList.toggle('btn-active-indigo', t==='葷'); 
    document.getElementById('btn-veg').classList.toggle('btn-active-green', t==='素'); 

    // 如果切換到素食，執行自動重排
    if (t === '素') {
        autoSortVegFirst();
    }
    
    renderSidebar(); 
}

// 自動將有素食的部門排到最前面的邏輯
function autoSortVegFirst() {
    const s = getStats();
    // 將部門分成：有素食待排、無素食待排
    const hasVeg = [], noVeg = [];
    
    deptOrder.forEach(d => {
        const remVeg = getRemain(d, '素');
        if (remVeg > 0) hasVeg.push(d);
        else noVeg.push(d);
    });
    
    // 重新組合順序：有素食的在前，其餘在後
    deptOrder = [...hasVeg, ...noVeg];
    save(); // 存下這個由系統調整過的順序
}

        function exportProject() { 
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(new Blob([JSON.stringify({rawData, tables, deptAliases, deptOrder})], {type: 'application/json'})); 
    a.download = `尾牙專案.json`; 
    a.click(); 
}
       function importProject(input) { 
    const reader = new FileReader(); 
    reader.onload = (e) => { 
        const d = JSON.parse(e.target.result); 
        rawData = d.rawData; 
        tables = d.tables; 
        deptAliases = d.deptAliases || {}; 
        deptOrder = d.deptOrder || []; 
        renderCanvas(); 
    }; 
    reader.readAsText(input.files[0]); 
}
        function exportImage() {
    const captureArea = document.getElementById('capture-area');
    const scrollWrapper = document.getElementById('scroll-wrapper');

    const oldScrollTop = scrollWrapper.scrollTop;
    const oldScrollLeft = scrollWrapper.scrollLeft;

    scrollWrapper.scrollTop = 0;
    scrollWrapper.scrollLeft = 0;

    // 增加一個小延遲，確保瀏覽器重新渲染佈局後再截圖
    setTimeout(() => {
        html2canvas(captureArea, { 
            scale: 2, 
            useCORS: true,
            backgroundColor: "#e2e8f0",
            scrollY: 0, 
            scrollX: 0,
            // 新增這兩行優化參數
            logging: false,
            width: captureArea.offsetWidth,
            height: captureArea.offsetHeight
        }).then(canvas => {
            const a = document.createElement('a');
            const date = new Date().toISOString().split('T')[0];
            a.download = `貿協尾牙桌圖_${date}.png`;
            a.href = canvas.toDataURL("image/png");
            a.click();
            
            scrollWrapper.scrollTop = oldScrollTop;
            scrollWrapper.scrollLeft = oldScrollLeft;
        });
    }, 100); 
}
        
        function assignToTable(t) {
            const isVeg = (t.assigned||[]).some(a=>a.type==='素'), isMeat = (t.assigned||[]).some(a=>a.type==='葷');
            if((assignType==='素'&&isMeat) || (assignType==='葷'&&isVeg)) return alert("葷素不可併桌");
            const rem = getRemain(selectedDept, assignType);
            const count = parseInt(prompt(`分配 ${selectedDept} (${assignType}) 到 ${t.displayId} 桌`, rem));
            if(count > 0) {
                const ex = t.assigned.find(a=>a.dept===selectedDept && a.type===assignType);
                if(ex) ex.count += count; else t.assigned.push({dept:selectedDept, count, type:assignType});
                selectedDept = null; renderCanvas();
            }
        }

        document.getElementById('excel-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const workbook = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header:1});
                for(let i=1; i<rows.length; i++){
                    const r = rows[i]; if(!r || r.length < 1) continue;
                    tempRawData.push({ dept: String(r[0]||'').trim(), group: String(r[1]||'').trim(), id: String(r[2]||'').trim(), name: String(r[3]||'').trim(), diet: String(r[4]||'葷').trim() });
                }
                renderDataTable(); e.target.value = '';
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
function exportExcelList() {
    if (rawData.length === 0) return alert("沒有名單可以匯出！");
    
    // 準備標題列
    const data = [["單位 (部門)", "組別", "員編", "姓名", "飲食選擇"]];
    
    // 放入名單數據
    rawData.forEach(item => {
        data.push([item.dept, item.group, item.id, item.name, item.diet]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "員工名單");
    
    // 檔名加上今天的日期
    const date = new Date().toISOString().split('T')[0];
    XLSX.writeFile(wb, `貿協尾牙名單_${date}.xlsx`);
}
