<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - Excel 匯入版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .main-walkway { margin-right: 100px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, minmax(80px, 1fr));
            gap: 1rem;
            justify-content: center;
        }
        .sidebar { width: 300px; transition: all 0.3s; }
        .table-circle { transition: all 0.2s; position: relative; }
        .table-circle:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex">

    <div class="sidebar bg-white shadow-xl h-screen sticky top-0 p-6 overflow-y-auto flex flex-col">
        <h2 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2">資料匯入</h2>
        
        <label class="block mb-6">
            <span class="sr-only">選擇 Excel 檔案</span>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" 
                class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
        </label>

        <div id="stats-area" class="flex-1">
            <h3 class="font-bold text-slate-600 mb-3 flex items-center justify-between">
                待分配名單 
                <span id="total-count" class="text-xs bg-slate-200 px-2 py-1 rounded">0 人</span>
            </h3>
            <div id="dept-list" class="space-y-2">
                <p class="text-sm text-slate-400 italic text-center py-10">請先上傳 Excel 資料表</p>
            </div>
        </div>
        
        <div class="mt-auto pt-4 border-t text-[10px] text-slate-400">
            * 欄位需包含：單位、組別、姓名、飲食選擇
        </div>
    </div>

    <div class="flex-1 p-8 overflow-auto">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-800">尾牙座位配置圖</h1>
                    <p class="text-slate-500">點擊左側單位，再點擊右側桌子進行分配</p>
                </div>
                <div class="flex gap-4 bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                    <div class="flex items-center gap-2 text-sm text-slate-600">
                        <div class="w-3 h-3 bg-blue-500 rounded-full"></div> 一般桌 (10人)
                    </div>
                    <div class="flex items-center gap-2 text-sm text-slate-600">
                        <div class="w-3 h-3 bg-amber-400 rounded-full"></div> 主桌 (12人)
                    </div>
                </div>
            </div>

            <div class="w-full h-12 bg-rose-600 text-white flex items-center justify-center mb-16 rounded-md shadow-md font-bold tracking-[1em]">
                STAGE 舞台
            </div>

            <div id="grid-container" class="grid-container"></div>
        </div>
    </div>

    <div id="toast" class="fixed top-5 right-5 bg-black text-white px-6 py-3 rounded-lg shadow-2xl transform translate-x-full transition-transform duration-300 z-[100]"></div>

    <script>
        let rawData = [];
        let deptStats = {};
        let tables = JSON.parse(localStorage.getItem('v3_tables')) || [];
        let selectedDeptGroup = null; // 當前選中要分配的單位組別

        // 1. 初始化桌位 (12x9)
        function initTables() {
            if (tables.length > 0) return;
            const ROWS = 9;
            const COLS = 12;
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const isMain = (r === 1 && c === 6);
                    if (r === 1 && (c === 6 || c === 7)) {
                        if (c === 6) tables.push({ id: `t-${r}-${c}`, r, c, label: '主桌 1', isMain: true, capacity: 12, assigned: [] });
                    } else {
                        tables.push({ id: `t-${r}-${c}`, r, c, label: '', isMain: false, capacity: 10, assigned: [] });
                    }
                }
            }
        }

        // 2. 讀取 Excel
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                rawData = XLSX.utils.sheet_to_json(firstSheet);
                processData();
                showToast("✅ 資料匯入成功！");
            };
            reader.readAsArrayBuffer(file);
        });

        // 3. 處理資料與統計
        function processData() {
            deptStats = {};
            let total = 0;
            rawData.forEach(item => {
                const key = `${item['單位']}-${item['組別'] || '無'}`;
                if (!deptStats[key]) deptStats[key] = { dept: item['單位'], group: item['組別'], count: 0, members: [] };
                deptStats[key].count++;
                deptStats[key].members.push(item);
                total++;
            });
            document.getElementById('total-count').innerText = `${total} 人`;
            renderSidebar();
        }

        // 4. 渲染左側清單
        function renderSidebar() {
            const list = document.getElementById('dept-list');
            list.innerHTML = '';
            
            Object.keys(deptStats).forEach(key => {
                const item = deptStats[key];
                // 計算已被分配的人數
                let assignedCount = 0;
                tables.forEach(t => {
                    t.assigned.forEach(a => {
                        if (a.key === key) assignedCount += a.count;
                    });
                });
                const remaining = item.count - assignedCount;

                if (remaining <= 0) return; // 已全部分配則不顯示

                const div = document.createElement('div');
                div.className = `p-3 border rounded-lg cursor-pointer transition-all hover:border-blue-500 ${selectedDeptGroup === key ? 'bg-blue-50 border-blue-600 shadow-inner' : 'bg-white'}`;
                div.onclick = () => selectDept(key);
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-sm text-slate-700">${item.dept}</span>
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">${remaining} 人</span>
                    </div>
                    <div class="text-[10px] text-slate-400 mt-1">${item.group || ''}</div>
                `;
                list.appendChild(div);
            });
        }

        function selectDept(key) {
            selectedDeptGroup = (selectedDeptGroup === key) ? null : key;
            renderSidebar();
        }

        // 5. 渲染桌位畫布
        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            localStorage.setItem('v3_tables', JSON.stringify(tables));

            tables.forEach(table => {
                const cell = document.createElement('div');
                const currentLoad = table.assigned.reduce((sum, a) => sum + a.count, 0);
                const isOver = currentLoad > table.capacity;

                cell.className = `table-circle w-20 h-20 rounded-full flex flex-col items-center justify-center text-center p-2 shadow-sm border-2 cursor-pointer
                    ${table.isMain ? 'bg-amber-400 border-amber-200' : 'bg-white border-slate-200'}
                    ${table.r === 1 && table.c === 6 ? 'scale-125 z-10' : ''}
                    ${selectedDeptGroup ? 'hover:bg-blue-50 border-dashed border-blue-300' : ''}
                `;
                if (table.c === 6) cell.classList.add('main-walkway');

                cell.onclick = () => assignToTable(table.id);

                let contentHtml = `<span class="text-[9px] opacity-40">${table.r}-${table.c}</span>`;
                
                // 顯示已分配單位
                if (table.assigned.length > 0) {
                    contentHtml += `<div class="text-[10px] font
