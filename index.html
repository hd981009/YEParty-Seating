<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - V7 邏輯嚴密版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .grid-cell { width: 70px; height: 70px; }
        .walkway-bg { background-color: #f8fafc; }
        .canvas-container { display: grid; grid-template-columns: repeat(20, 70px); gap: 10px; padding: 30px; }
        
        /* 邊框狀態邏輯 */
        .status-full { border: 3px solid currentColor !important; } /* 滿員：實線 */
        .status-partial { border: 3px dashed #f97316 !important; } /* 未滿：橘色虛線 */
        .status-over { animation: pulse-red 1s infinite; border: 4px solid #ef4444 !important; } /* 超標：紅色閃爍 */

        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .dragging { opacity: 0.2; transform: scale(0.8); }
        .drop-target { background-color: #f0f9ff; border: 2px solid #0ea5e9; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex select-none text-slate-800" oncontextmenu="return false;">

    <div class="w-80 bg-white shadow-2xl h-screen sticky top-0 p-6 flex flex-col border-r z-50">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-indigo-600 text-white p-1 rounded text-sm">PRO</span> 排座管理系統
        </h2>
        
        <div class="flex gap-2 mb-6">
            <button id="mode-normal" onclick="setMode('normal')" class="flex-1 py-2 rounded bg-indigo-600 text-white text-xs font-bold">一般桌 (10)</button>
            <button id="mode-main" onclick="setMode('main')" class="flex-1 py-2 rounded bg-white border border-slate-200 text-slate-600 text-xs font-bold">主桌 (12)</button>
        </div>

        <div class="border-t pt-4 mb-4">
            <input type="file" id="excel-upload" accept=".xlsx, .xls" class="block w-full text-xs text-slate-400 file:mr-3 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-slate-100 cursor-pointer"/>
        </div>

        <div id="dept-area" class="flex-1 overflow-y-auto hidden">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-slate-700 text-sm">單位剩餘人數</h3>
                <button id="lock-btn" onclick="toggleLock()" class="text-[10px] px-2 py-1 rounded bg-slate-200 hover:bg-slate-300 font-bold transition-colors">🔓 未鎖定部門</button>
            </div>
            <div id="dept-list" class="space-y-1"></div>
        </div>
        
        <div class="mt-auto bg-slate-100 p-3 rounded-lg text-[10px] text-slate-500 space-y-1">
            <p>• <span class="text-indigo-600 font-bold">左鍵單擊</span>：管理桌位/分配人數</p>
            <p>• <span class="text-orange-600 font-bold">橘色虛線</span>：該桌人數尚未坐滿</p>
            <p>• <span class="text-red-600 font-bold">右鍵單擊</span>：刪除該張桌子</p>
        </div>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200/50">
        <div class="min-w-max p-10">
            <div class="w-[600px] h-10 bg-slate-900 text-white flex items-center justify-center mx-auto mb-16 rounded-b-2xl font-bold tracking-[1.5em]">STAGE 舞台</div>
            <div id="canvas" class="canvas-container mx-auto bg-white/80 rounded-3xl shadow-sm border border-slate-200"></div>
        </div>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-96">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black" id="modal-title">管理桌位</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div id="modal-content" class="space-y-3 mb-6"></div>
            <button onclick="closeModal()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">確認儲存</button>
        </div>
    </div>

    <script>
        const COLS = 20, ROWS = 15, WALKWAY_COL = 11;
        let currentMode = 'normal', tables = JSON.parse(localStorage.getItem('v7_tables')) || [];
        let deptStats = {}, deptColors = {}, selectedPath = { dept: null, group: null };
        let isLocked = false, draggedTable = null, currentEditingTable = null;
        const COLORS = ["#4f46e5", "#e11d48", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4", "#f97316"];

        function setMode(m) { currentMode = m; renderUI(); }
        function toggleLock() { 
            isLocked = !isLocked; 
            document.getElementById('lock-btn').innerText = isLocked ? '🔒 部門已鎖定' : '🔓 未鎖定部門';
            document.getElementById('lock-btn').classList.toggle('bg-amber-100', isLocked);
            renderSidebar();
        }

        function sortTables() {
            tables.sort((a, b) => a.r !== b.r ? a.r - b.r : a.c - b.c);
            let n = 1, m = 1;
            tables.forEach(t => { t.displayId = t.type === 'main' ? `M${m++}` : n++; t.capacity = t.type === 'main' ? 12 : 10; });
        }

        function renderCanvas() {
            sortTables();
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-full flex items-center justify-center relative ${c === WALKWAY_COL ? 'walkway-bg' : ''}`;
                    cell.dataset.r = r; cell.dataset.c = c;

                    const table = tables.find(t => t.r === r && t.c === c);
                    if (table) {
                        const total = (table.assigned || []).reduce((s, a) => s + a.count, 0);
                        const statusClass = total > table.capacity ? 'status-over' : (total === table.capacity ? 'status-full' : (total > 0 ? 'status-partial' : ''));
                        
                        const tableEl = document.createElement('div');
                        tableEl.draggable = true;
                        tableEl.className = `w-14 h-14 rounded-full shadow-lg flex flex-col items-center justify-center text-white transition-all overflow-hidden ${statusClass}`;
                        tableEl.style.backgroundColor = table.themeColor || (table.type === 'main' ? '#fbbf24' : '#6366f1');
                        tableEl.style.color = 'white';

                        tableEl.innerHTML = `<div class="text-[9px] font-black opacity-80">${table.displayId}</div>`;
                        (table.assigned || []).slice(0,2).forEach(a => {
                            tableEl.innerHTML += `<div class="text-[8px] font-bold truncate w-full text-center">${a.dept.substring(0,2)}${a.count}</div>`;
                        });

                        // 事件
                        tableEl.onclick = (e) => { e.stopPropagation(); if (selectedPath.dept) assignToTable(table); else openManageModal(table); };
                        tableEl.oncontextmenu = (e) => { if(confirm(`確定刪除 ${table.displayId} 桌嗎？`)) { tables = tables.filter(t => t !== table); renderCanvas(); } };
                        tableEl.ondragstart = () => { draggedTable = table; tableEl.classList.add('dragging'); };
                        tableEl.ondragend = () => { draggedTable = null; renderCanvas(); };

                        cell.appendChild(tableEl);
                    } else {
                        cell.className += " border border-dashed border-slate-200 hover:bg-indigo-50";
                        cell.onclick = () => { tables.push({ r, c, type: currentMode, assigned: [], themeColor: null }); renderCanvas(); };
                    }

                    // 拖曳邏輯
                    cell.ondragover = (e) => e.preventDefault();
                    cell.ondrop = (e) => {
                        if (!draggedTable) return;
                        const target = tables.find(t => t.r === r && t.c === c);
                        if (target) { // 交換
                            [draggedTable.r, draggedTable.c, target.r, target.c] = [r, c, draggedTable.r, draggedTable.c];
                        } else { // 移動
                            draggedTable.r = r; draggedTable.c = c;
                        }
                        renderCanvas();
                    };
                    canvas.appendChild(cell);
                }
            }
            localStorage.setItem('v7_tables', JSON.stringify(tables));
            renderSidebar();
        }

        // 核心邏輯：計算該單位目前的剩餘人數
        function getRemain(dName, gName = null) {
            if (!deptStats[dName]) return 0;
            const totalInDept = gName ? deptStats[dName].groups[gName] : deptStats[dName].total;
            let assigned = 0;
            tables.forEach(t => (t.assigned || []).forEach(a => {
                if (a.dept === dName && (!gName || a.group === gName)) assigned += a.count;
            }));
            return totalInDept - assigned;
        }

        function renderSidebar() {
            const list = document.getElementById('dept-list'); list.innerHTML = '';
            Object.keys(deptStats).forEach(dName => {
                const remain = getRemain(dName);
                if (remain <= 0 && !selectedPath.dept === dName) return;
                
                const div = document.createElement('div');
                div.className = `p-2 rounded cursor-pointer border mb-1 text-xs font-bold flex justify-between ${selectedPath.dept === dName ? 'bg-slate-800 text-white' : 'bg-white'}`;
                div.style.borderLeft = `4px solid ${deptColors[dName]}`;
                div.innerHTML = `<span>${dName}</span><span>${remain}人</span>`;
                div.onclick = () => { if(isLocked) return; selectedPath.dept = (selectedPath.dept === dName) ? null : dName; selectedPath.group = null; renderSidebar(); };
                list.appendChild(div);

                if (selectedPath.dept === dName) {
                    const gBox = document.createElement('div');
                    gBox.className = "ml-4 space-y-1 mb-2";
                    Object.keys(deptStats[dName].groups).forEach(gName => {
                        const gRemain = getRemain(dName, gName);
                        const gDiv = document.createElement('div');
                        gDiv.className = `p-1 text-[10px] rounded border ${selectedPath.group === gName ? 'bg-indigo-500 text-white' : 'bg-slate-100'}`;
                        gDiv.innerText = `${gName} (${gRemain}人)`;
                        gDiv.onclick = (e) => { e.stopPropagation(); selectedPath.group = (selectedPath.group === gName) ? null : gName; renderSidebar(); };
                        gBox.appendChild(gDiv);
                    });
                    list.appendChild(gBox);
                }
            });
        }

        function assignToTable(table) {
            const d = selectedPath.dept, g = selectedPath.group;
            const remain = getRemain(d, g);
            if (remain <= 0) { alert("該單位/組別人數已全部分配完畢！"); return; }

            const input = prompt(`分配 [${d}${g?'-'+g:''}] 到 ${table.displayId}，請輸入人數 (上限 ${remain})：`, remain);
            const count = parseInt(input);
            
            if (count > remain) { alert(`不可超過待分配人數 (${remain}人)！`); return; }
            if (count > 0) {
                table.assigned.push({ dept: d, group: g, count });
                if (!table.themeColor) table.themeColor = deptColors[d];
                selectedPath = { dept: null, group: null };
                renderCanvas();
            }
        }

        function openManageModal(table) {
            currentEditingTable = table;
            const modal = document.getElementById('manage-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = '';
            
            table.assigned.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-slate-50 p-2 rounded border";
                // 修正人數時也要檢查總庫存
                const currentRemain = getRemain(a.dept, a.group) + a.count; 
                div.innerHTML = `
                    <span class="text-xs font-bold flex-1">${a.dept}${a.group?'-'+a.group:''}</span>
                    <input type="number" value="${a.count}" max="${currentRemain}" 
                        class="w-16 border rounded text-center text-sm" 
                        onchange="updateTableCount(${i}, this.value, ${currentRemain})">
                    <button onclick="removeAssign(${i})" class="text-red-400">✕</button>
                `;
                content.appendChild(div);
            });
            modal.classList.remove('hidden');
        }

        function updateTableCount(idx, val, max) {
            const v = parseInt(val);
            if (v > max) { alert(`調整失敗！該單位剩餘庫存不足，最大可設為 ${max}`); renderCanvas(); return; }
            currentEditingTable.assigned[idx].count = v;
        }

        function removeAssign(idx) {
            currentEditingTable.assigned.splice(idx, 1);
            if(currentEditingTable.assigned.length === 0) currentEditingTable.themeColor = null;
            openManageModal(currentEditingTable);
        }

        function closeModal() { document.getElementById('manage-modal').classList.add('hidden'); renderCanvas(); }

        document.getElementById('excel-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const raw = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).Sheets[0]);
                deptStats = {}; let c = 0;
                raw.forEach(item => {
                    const d = item['單位'], g = item['組別'] || '其他';
                    if (!deptStats[d]) { deptStats[d] = { total: 0, groups: {} }; deptColors[d] = COLORS[c++ % COLORS.length]; }
                    if (!deptStats[d].groups[g]) deptStats[d].groups[g] = 0;
                    deptStats[d].total++; deptStats[d].groups[g]++;
                });
                document.getElementById('dept-area').classList.remove('hidden');
                renderCanvas();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        function renderUI() {
            document.getElementById('mode-normal').className = `flex-1 py-2 rounded text-xs font-bold ${currentMode==='normal'?'bg-indigo-600 text-white shadow-md':'bg-white border text-slate-600'}`;
            document.getElementById('mode-main').className = `flex-1 py-2 rounded text-xs font-bold ${currentMode==='main'?'bg-amber-500 text-white shadow-md':'bg-white border text-slate-600'}`;
        }

        renderCanvas();
    </script>
</body>
</html>
