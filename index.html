<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - 自由佈設版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .grid-cell { width: 60px; height: 60px; transition: all 0.2s; }
        .walkway-bg { bg-slate-200; } /* 主走道顏色 */
        .sidebar { width: 320px; }
        .canvas-container { 
            display: grid; 
            grid-template-columns: repeat(20, 60px); /* 擴大網格範圍至20欄 */
            gap: 8px;
            padding: 40px;
        }
        .table-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex">

    <div class="sidebar bg-white shadow-2xl h-screen sticky top-0 p-6 flex flex-col border-r border-slate-200 z-50">
        <h2 class="text-2xl font-black mb-6 text-slate-800">配置工具箱</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center">
                <div class="text-xs text-blue-500 font-bold uppercase">一般桌</div>
                <div id="count-normal" class="text-2xl font-black text-blue-700">0</div>
            </div>
            <div class="bg-amber-50 p-3 rounded-xl border border-amber-100 text-center">
                <div class="text-xs text-amber-500 font-bold uppercase">主桌</div>
                <div id="count-main" class="text-2xl font-black text-amber-700">0</div>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <p class="text-sm text-slate-500 font-medium">1. 選擇桌子類型：</p>
            <div class="flex gap-2">
                <button id="mode-normal" onclick="setMode('normal')" class="flex-1 py-3 rounded-lg border-2 border-blue-600 bg-blue-600 text-white font-bold transition-all shadow-lg shadow-blue-200">一般桌</button>
                <button id="mode-main" onclick="setMode('main')" class="flex-1 py-3 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold hover:border-amber-400 transition-all">主桌</button>
            </div>
        </div>

        <div class="border-t pt-6">
            <p class="text-sm text-slate-500 font-medium mb-3">2. 匯入名單 (Excel)：</p>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" class="block w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-slate-100 file:text-slate-600 hover:file:bg-slate-200 cursor-pointer"/>
        </div>

        <div id="dept-area" class="mt-8 flex-1 overflow-y-auto hidden">
            <h3 class="font-bold text-slate-700 mb-4 border-b pb-2">待分配名單</h3>
            <div id="dept-list" class="space-y-2"></div>
        </div>

        <button onclick="clearAll()" class="mt-auto text-xs text-red-400 hover:text-red-600 underline text-left">重設所有桌位</button>
    </div>

    <div class="flex-1 overflow-auto bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-100">
        <div class="min-w-max p-12">
            <div class="w-[600px] h-16 bg-slate-800 text-white flex items-center justify-center mx-auto mb-20 rounded-b-3xl shadow-2xl font-black text-xl tracking-[1.5em] relative">
                STAGE 舞台
                <div class="absolute -bottom-10 text-slate-400 text-xs font-normal tracking-normal uppercase">前方區域</div>
            </div>

            <div id="canvas" class="canvas-container mx-auto bg-white/50 rounded-3xl shadow-inner border border-white/80">
                </div>
        </div>
    </div>

    <script>
        const COLS = 20;
        const ROWS = 15;
        const WALKWAY_COLS = [10, 11]; // 定義主走道欄位
        let currentMode = 'normal'; // 'normal' or 'main'
        let tables = JSON.parse(localStorage.getItem('free_tables')) || [];
        let deptStats = {};
        let selectedDeptKey = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-normal').className = mode === 'normal' ? 'flex-1 py-3 rounded-lg border-2 border-blue-600 bg-blue-600 text-white font-bold shadow-lg shadow-blue-200' : 'flex-1 py-3 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold';
            document.getElementById('mode-main').className = mode === 'main' ? 'flex-1 py-3 rounded-lg border-2 border-amber-500 bg-amber-500 text-white font-bold shadow-lg shadow-amber-200' : 'flex-1 py-3 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold';
        }

        function renderCanvas() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            let normalCount = 0;
            let mainCount = 0;

            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const cell = document.createElement('div');
                    const isWalkway = WALKWAY_COLS.includes(c);
                    const table = tables.find(t => t.r === r && t.c === c);

                    cell.className = `grid-cell rounded-full flex items-center justify-center cursor-pointer relative `;
                    
                    if (isWalkway) {
                        cell.classList.add('bg-slate-200/50'); // 走道標示
                    } else {
                        cell.classList.add('hover:bg-blue-50', 'border', 'border-slate-100');
                    }

                    if (table) {
                        cell.classList.add('table-pop');
                        if (table.type === 'main') {
                            cell.innerHTML = `<div class="w-14 h-14 bg-amber-400 rounded-full shadow-lg flex items-center justify-center text-[10px] font-black text-amber-900 ring-4 ring-amber-100">主桌</div>`;
                            mainCount++;
                        } else {
                            const currentLoad = (table.assigned || []).reduce((s, a) => s + a.count, 0);
                            cell.innerHTML = `
                                <div class="w-12 h-12 bg-blue-500 rounded-full shadow-md flex flex-col items-center justify-center text-[9px] font-bold text-white relative">
                                    <span>${currentLoad > 0 ? currentLoad : ''}</span>
                                    <div class="absolute -top-1 -right-1 bg-white text-blue-600 w-4 h-4 rounded-full flex items-center justify-center text-[8px] border border-blue-200 shadow-sm">${table.id}</div>
                                </div>`;
                            normalCount++;
                        }
                        cell.onclick = () => handleTableClick(r, c, table);
                    } else {
                        cell.onclick = () => placeTable(r, c);
                    }

                    canvas.appendChild(cell);
                }
            }

            document.getElementById('count-normal').innerText = normalCount;
            document.getElementById('count-main').innerText = mainCount;
            localStorage.setItem('free_tables', JSON.stringify(tables));
        }

        function placeTable(r, c) {
            const id = tables.length + 1;
            tables.push({ id, r, c, type: currentMode, assigned: [] });
            renderCanvas();
        }

        function handleTableClick(r, c, table) {
            if (selectedDeptKey) {
                // 如果左側有選中單位，執行分配
                assignToTable(table);
            } else {
                // 否則移除桌子
                if (confirm(`確定要移除這張桌子嗎？`)) {
                    tables = tables.filter(t => !(t.r === r && t.c === c));
                    renderCanvas();
                }
            }
        }

        function clearAll() {
            if (confirm("這將清除所有已擺放的桌位，確定嗎？")) {
                tables = [];
                renderCanvas();
            }
        }

        // Excel & 分配邏輯 (承襲上一版並微調)
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                processExcel(raw);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function processExcel(raw) {
            deptStats = {};
            raw.forEach(item => {
                const key = `${item['單位']}-${item['組別'] || '無'}`;
                if (!deptStats[key]) deptStats[key] = { dept: item['單位'], group: item['組別'], count: 0 };
                deptStats[key].count++;
            });
            document.getElementById('dept-area').classList.remove('hidden');
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('dept-list');
            list.innerHTML = '';
            Object.keys(deptStats).forEach(key => {
                const item = deptStats[key];
                let assigned = 0;
                tables.forEach(t => (t.assigned || []).forEach(a => { if (a.key === key) assigned += a.count; }));
                const remain = item.count - assigned;
                if (remain <= 0) return;

                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border cursor-pointer transition-all ${selectedDeptKey === key ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-slate-100 hover:border-blue-300'}`;
                div.innerHTML = `<div class="flex justify-between font-bold text-xs"><span>${item.dept}</span><span>${remain}人</span></div><div class="text-[9px] opacity-70">${item.group}</div>`;
                div.onclick = () => { selectedDeptKey = (selectedDeptKey === key) ? null : key; renderSidebar(); renderCanvas(); };
                list.appendChild(div);
            });
        }

        function assignToTable(table) {
            const data = deptStats[selectedDeptKey];
            let assigned = 0;
            tables.forEach(t => (t.assigned || []).forEach(a => { if (a.key === selectedDeptKey) assigned += a.count; }));
            const remain = data.count - assigned;
            
            const num = parseInt(prompt(`分配到桌號 ${table.id}，請輸入人數：`, remain));
            if (num > 0 && num <= remain) {
                table.assigned.push({ key: selectedDeptKey, dept: data.dept, count: num });
                selectedDeptKey = null;
                renderSidebar();
                renderCanvas();
            }
        }

        renderCanvas();
    </script>
</body>
</html>
