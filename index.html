<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - V12 自定義簡稱版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .grid-cell { width: 70px; height: 70px; }
        .walkway-bg { background-color: #f1f5f9; border: 1px solid #cbd5e1; }
        .canvas-container { display: grid; grid-template-columns: repeat(20, 70px); gap: 10px; padding: 30px; }
        .status-full { border: 3px solid currentColor !important; } 
        .status-over { animation: pulse-red 1.5s infinite; border: 4px solid #ef4444 !important; } 
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .veg-active { border: 2px solid #22c55e !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex select-none text-slate-800" oncontextmenu="return false;">

    <div class="w-80 bg-white shadow-2xl h-screen sticky top-0 p-6 flex flex-col border-r z-50">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-indigo-600 text-white p-1 rounded text-xs">V12</span> 排座系統
        </h2>
        
        <div class="flex gap-2 mb-4">
            <button onclick="setMode('normal')" id="mode-normal" class="flex-1 py-2 rounded bg-indigo-600 text-white text-[10px] font-bold shadow-md">一般桌</button>
            <button onclick="setMode('main')" id="mode-main" class="flex-1 py-2 rounded bg-white border text-slate-600 text-[10px] font-bold">主桌</button>
        </div>

        <div class="bg-slate-100 p-1 rounded-xl flex mb-4">
            <button id="btn-meat" onclick="setAssignType('葷')" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-indigo-600">排葷食</button>
            <button id="btn-veg" onclick="setAssignType('素')" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-400">排素食</button>
        </div>

        <div id="veg-global-stats" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-xl">
            <div class="text-[10px] text-green-600 font-bold uppercase">全公司素食剩餘</div>
            <div class="text-2xl font-black text-green-700"><span id="global-veg-count">0</span> <span class="text-xs font-normal">人</span></div>
        </div>

        <button onclick="openDataModal()" class="w-full py-2 border border-slate-300 text-slate-500 rounded-lg text-xs font-bold mb-4 hover:bg-slate-50 transition-all">名單管理 / 匯入 Excel</button>

        <div id="dept-area" class="flex-1 overflow-y-auto border-t pt-4">
            <div class="flex justify-between items-end mb-3">
                <h3 class="font-bold text-slate-400 text-[10px] uppercase tracking-widest">單位待排清單</h3>
                <span class="text-[8px] text-slate-300 italic">右鍵可自訂簡稱</span>
            </div>
            <div id="dept-list" class="space-y-1"></div>
        </div>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200/40">
        <div class="min-w-max p-10">
            <div class="w-[600px] h-10 bg-slate-900 text-white flex items-center justify-center mx-auto mb-16 rounded-b-2xl font-bold tracking-[1.5em] shadow-2xl">STAGE 舞台</div>
            <div id="canvas" class="canvas-container mx-auto bg-white/90 rounded-3xl shadow-sm border border-slate-200"></div>
        </div>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white rounded-2xl shadow-2xl w-[90%] h-[85%] flex flex-col p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-black">名單數據管理</h3>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('excel-upload').click()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm">匯入 Excel</button>
                    <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls"/>
                    <button onclick="addRow()" class="px-4 py-2 border rounded-lg font-bold text-sm">＋ 手動新增</button>
                    <button onclick="closeDataModal()" class="px-4 py-2 bg-slate-800 text-white rounded-lg font-bold text-sm">儲存並關閉</button>
                </div>
            </div>
            <div class="flex-1 overflow-auto border rounded-xl bg-white"><table class="w-full text-left text-sm"><thead class="bg-slate-100 sticky top-0"><tr><th class="p-3">單位</th><th class="p-3">組別</th><th class="p-3">員編</th><th class="p-3">姓名</th><th class="p-3">飲食</th><th class="p-3 w-16 text-center">刪除</th></tr></thead><tbody id="data-table-body"></tbody></table></div>
        </div>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-80">
            <div class="flex justify-between items-center mb-4"><h3 class="font-black" id="modal-title">管理桌位</h3><button onclick="closeManageModal()">✕</button></div>
            <div id="modal-content" class="space-y-2 mb-6 max-h-60 overflow-y-auto border-y py-2"></div>
            <button onclick="closeManageModal()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">完成</button>
        </div>
    </div>

    <script>
        let rawData = JSON.parse(localStorage.getItem('v12_raw')) || []; 
        let tables = JSON.parse(localStorage.getItem('v12_tables')) || [];
        let deptAliases = JSON.parse(localStorage.getItem('v12_aliases')) || {}; // 存儲簡稱
        let currentTableMode = 'normal', assignType = '葷';
        let deptColors = {}, selectedDept = null, draggedTable = null, currentEditingTable = null;
        const ROWS = 15, COLS = 20, WALKWAY_COL = 11, COLORS = ["#4f46e5", "#e11d48", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4", "#f97316"];

        // --- 核心邏輯 ---
        function setAssignType(type) {
            assignType = type;
            const bM = document.getElementById('btn-meat'), bV = document.getElementById('btn-veg'), vStats = document.getElementById('veg-global-stats');
            if(type === '葷') {
                bM.className = "flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-indigo-600";
                bV.className = "flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-400";
                vStats.classList.add('hidden');
            } else {
                bV.className = "flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-green-600";
                bM.className = "flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-400";
                vStats.classList.remove('hidden');
                updateGlobalVeg();
            }
            renderSidebar();
        }

        function updateGlobalVeg() {
            const stats = getStats();
            let total = 0;
            Object.keys(stats).forEach(d => { total += getRemain(d, '素'); });
            document.getElementById('global-veg-count').innerText = total;
        }

        function getStats() {
            let s = {};
            rawData.forEach(d => {
                if(!s[d.dept]) s[d.dept] = { meat: 0, veg: 0 };
                if(String(d.diet).includes('素')) s[d.dept].veg++; else s[d.dept].meat++;
            });
            return s;
        }

        function getRemain(dName, type) {
            const stats = getStats()[dName] || { meat:0, veg:0 };
            let assigned = 0;
            tables.forEach(t => (t.assigned || []).forEach(a => { if(a.dept === dName && a.type === type) assigned += a.count; }));
            return (type === '葷' ? stats.meat : stats.veg) - assigned;
        }

        // --- 繪製畫布 ---
        function renderCanvas() {
            tables.sort((a,b)=>a.r!==b.r?a.r-b.r:a.c-b.c);
            let n=1, m=1; tables.forEach(t=>{t.displayId=t.type==='main'?`M${m++}`:n++; t.capacity=t.type==='main'?12:10;});
            const canvas = document.getElementById('canvas'); canvas.innerHTML = '';
            for(let r=1; r<=ROWS; r++){
                for(let c=1; c<=COLS; c++){
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-full flex items-center justify-center relative ${c===WALKWAY_COL?'walkway-bg':''}`;
                    const table = tables.find(t=>t.r===r && t.c===c);
                    if(table){
                        const total = (table.assigned||[]).reduce((s,a)=>s+a.count,0);
                        const isVegTable = (table.assigned||[]).some(a => a.type === '素');
                        let sc = total > table.capacity ? 'status-over' : (total === table.capacity ? 'status-full' : (total>0?'status-partial':''));
                        const tableEl = document.createElement('div');
                        tableEl.draggable = true;
                        tableEl.className = `w-14 h-14 rounded-full shadow-lg flex flex-col items-center justify-center text-white transition-all ${sc} ${isVegTable?'veg-active':''}`;
                        tableEl.style.backgroundColor = table.themeColor || (isVegTable ? '#22c55e' : (table.type==='main'?'#fbbf24':'#6366f1'));
                        tableEl.innerHTML = `<div class="text-[9px] font-black">${table.displayId}</div>`;
                        (table.assigned||[]).slice(0,2).forEach(a=>{
                            // 使用自定義簡稱或前兩個字
                            const displayName = deptAliases[a.dept] || a.dept.substring(0,2);
                            tableEl.innerHTML += `<div class="text-[8px] font-bold leading-tight">${displayName}:${a.count}</div>`;
                        });
                        tableEl.onclick=(e)=>{e.stopPropagation(); if(selectedDept) assignToTable(table); else openManageModal(table);};
                        tableEl.oncontextmenu=(e)=>{e.preventDefault(); if(confirm('刪除桌子？')){tables=tables.filter(t=>t!==table); renderCanvas();}};
                        tableEl.ondragstart=()=>{draggedTable=table; tableEl.style.opacity="0.3";};
                        tableEl.ondragend=()=>{draggedTable=null; renderCanvas();};
                        cell.appendChild(tableEl);
                    } else {
                        cell.className += " border border-dashed border-slate-200 hover:bg-indigo-50 cursor-pointer";
                        cell.onclick=()=>{tables.push({r,c,type:currentTableMode,assigned:[],themeColor:null}); renderCanvas();};
                        cell.ondragover=(e)=>e.preventDefault();
                        cell.ondrop=()=>{if(draggedTable){draggedTable.r=r; draggedTable.c=c; renderCanvas();}};
                    }
                    canvas.appendChild(cell);
                }
            }
            if(assignType === '素') updateGlobalVeg();
            renderSidebar(); save();
        }

        function renderSidebar() {
            const list = document.getElementById('dept-list'), s = getStats();
            list.innerHTML = '';
            Object.keys(s).forEach((d, i) => {
                if(!deptColors[d]) deptColors[d]=COLORS[i % COLORS.length];
                const rem = getRemain(d, assignType);
                const isSel = selectedDept===d;
                const div = document.createElement('div');
                div.className = `p-2 rounded-lg cursor-pointer border mb-1 flex justify-between items-center transition-all ${isSel?'bg-slate-800 text-white shadow-md':'bg-white hover:border-slate-300'}`;
                div.style.borderLeft = `4px solid ${deptColors[d]}`;
                div.innerHTML = `<span class="text-xs font-bold">${d}</span><span class="text-[10px] font-black ${rem<0?'text-red-500':(isSel?'text-indigo-300':'text-slate-400')}">${rem}人</span>`;
                div.onclick=()=>{selectedDept=isSel?null:d; renderSidebar();};
                // 右鍵編輯簡稱
                div.oncontextmenu=(e)=>{
                    e.preventDefault();
                    const alias = prompt(`請輸入「${d}」顯示在桌上的簡稱：`, deptAliases[d] || d.substring(0,2));
                    if(alias !== null) { deptAliases[d] = alias; renderCanvas(); }
                };
                list.appendChild(div);
            });
        }

        function assignToTable(t) {
            const isVegTable = (t.assigned||[]).some(a => a.type === '素');
            const isMeatTable = (t.assigned||[]).some(a => a.type === '葷');
            if(assignType === '素' && isMeatTable) { alert("此為葷食桌！"); selectedDept=null; renderSidebar(); return; }
            if(assignType === '葷' && isVegTable) { alert("此為素食桌！"); selectedDept=null; renderSidebar(); return; }
            const rem = getRemain(selectedDept, assignType);
            const input = prompt(`分配 [${selectedDept}] ${assignType}食\n剩餘: ${rem} 人`, Math.max(0,rem));
            const count = parseInt(input);
            if(count > 0) {
                const existing = t.assigned.find(a => a.dept === selectedDept && a.type === assignType);
                if(existing) existing.count += count;
                else t.assigned.push({ dept: selectedDept, count, type: assignType });
                if(!t.themeColor) t.themeColor = (assignType==='素' ? '#22c55e' : deptColors[selectedDept]);
                selectedDept = null; renderCanvas();
            }
        }

        // --- 基礎設施 ---
        function openManageModal(t){
            currentEditingTable = t;
            const c = document.getElementById('modal-content'); c.innerHTML = '';
            document.getElementById('modal-title').innerText = `管理 ${t.displayId}`;
            t.assigned.forEach((a,i)=>{
                const d = document.createElement('div'); d.className="p-2 bg-slate-50 border rounded text-xs flex items-center justify-between";
                d.innerHTML = `<span><b>${a.dept}</b></span> <div class="flex items-center gap-1">人數:<input type="number" value="${a.count}" class="w-10 border text-center" onchange="currentEditingTable.assigned[${i}].count=parseInt(this.value)"> <button onclick="currentEditingTable.assigned.splice(${i},1);openManageModal(currentEditingTable)" class="text-red-400">✕</button></div>`;
                c.appendChild(d);
            });
            document.getElementById('manage-modal').classList.remove('hidden');
        }
        function closeManageModal(){ document.getElementById('manage-modal').classList.add('hidden'); renderCanvas(); }
        function save(){ localStorage.setItem('v12_raw', JSON.stringify(rawData)); localStorage.setItem('v12_tables', JSON.stringify(tables)); localStorage.setItem('v12_aliases', JSON.stringify(deptAliases)); }
        function setMode(m){ currentTableMode=m; document.getElementById('mode-normal').className=m==='normal'?'flex-1 py-2 rounded bg-indigo-600 text-white text-[10px] font-bold shadow-md':'flex-1 py-2 rounded bg-white border text-slate-600 text-[10px] font-bold'; document.getElementById('mode-main').className=m==='main'?'flex-1 py-2 rounded bg-amber-500 text-white text-[10px] font-bold shadow-md':'flex-1 py-2 rounded bg-white border text-slate-600 text-[10px] font-bold'; renderCanvas(); }
        function openDataModal() { document.getElementById('data-modal').classList.remove('hidden'); renderDataTable(); }
        function closeDataModal() { document.getElementById('data-modal').classList.add('hidden'); renderCanvas(); }
        function renderDataTable() {
            const tbody = document.getElementById('data-table-body'); tbody.innerHTML = '';
            rawData.forEach((item, index) => {
                const tr = document.createElement('tr'); tr.className="border-b";
                tr.innerHTML = `<td class="p-2"><input class="w-full" value="${item.dept||''}" onchange="updateData(${index},'dept',this.value)"></td><td class="p-2"><input class="w-full" value="${item.group||''}" onchange="updateData(${index},'group',this.value)"></td><td class="p-2"><input class="w-full" value="${item.id||''}" onchange="updateData(${index},'id',this.value)"></td><td class="p-2"><input class="w-full" value="${item.name||''}" onchange="updateData(${index},'name',this.value)"></td><td class="p-2"><input class="w-full" value="${item.diet||'葷'}" onchange="updateData(${index},'diet',this.value)"></td><td class="p-2 text-center"><button onclick="deleteRow(${index})" class="text-red-400">✕</button></td>`;
                tbody.appendChild(tr);
            });
        }
        function updateData(idx,k,v){ rawData[idx][k]=v; save(); }
        function addRow(){ rawData.unshift({dept:'新單位',group:'',id:'',name:'',diet:'葷'}); renderDataTable(); save(); }
        function deleteRow(idx){ rawData.splice(idx,1); renderDataTable(); save(); }
        document.getElementById('excel-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).SheetNames[0]], {header:1});
                const newData = [];
                for(let i=1; i<rows.length; i++){
                    const r = rows[i]; if(!r || r.length===0) continue;
                    newData.push({ dept: String(r[0]||'未分類'), group: String(r[1]||''), id: String(r[2]||''), name: String(r[3]||''), diet: String(r[4]||'葷') });
                }
                rawData = [...newData, ...rawData]; save(); renderDataTable(); renderCanvas();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
        renderCanvas();
    </script>
</body>
</html>
