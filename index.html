<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - V9.1 穩定匯入版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        .grid-cell { width: 70px; height: 70px; }
        .walkway-bg { background-color: #f1f5f9; border: 1px solid #cbd5e1; }
        .canvas-container { display: grid; grid-template-columns: repeat(20, 70px); gap: 10px; padding: 30px; }
        .status-full { border: 3px solid currentColor !important; } 
        .status-partial { border: 3px dashed #f97316 !important; } 
        .status-over { animation: pulse-red 1.5s infinite; border: 4px solid #ef4444 !important; } 
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex select-none text-slate-800" oncontextmenu="return false;">

    <div class="w-80 bg-white shadow-2xl h-screen sticky top-0 p-6 flex flex-col border-r z-50">
        <h2 class="text-xl font-bold mb-4">排座管理系統</h2>
        
        <div class="flex gap-2 mb-4">
            <button onclick="setMode('normal')" id="mode-normal" class="flex-1 py-2 rounded bg-indigo-600 text-white text-xs font-bold">一般桌(10)</button>
            <button onclick="setMode('main')" id="mode-main" class="flex-1 py-2 rounded bg-white border text-slate-600 text-xs font-bold">主桌(12)</button>
        </div>

        <button onclick="openDataModal()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-bold shadow-md transition-all flex items-center justify-center gap-2 mb-4">
            📊 名單管理 / 匯入資料
        </button>

        <div id="dept-area" class="flex-1 overflow-y-auto border-t pt-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-slate-700 text-xs">單位統計</h3>
                <span id="veg-total-info" class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">素食: 0</span>
            </div>
            <div id="dept-list" class="space-y-1"></div>
        </div>
    </div>

    <div class="flex-1 overflow-auto bg-slate-200/40">
        <div class="min-w-max p-10 text-center">
            <div class="w-[600px] h-10 bg-slate-900 text-white flex items-center justify-center mx-auto mb-16 rounded-b-2xl font-bold tracking-[1.5em] shadow-2xl">STAGE 舞台</div>
            <div id="canvas" class="canvas-container mx-auto bg-white/90 rounded-3xl shadow-sm border border-slate-200"></div>
        </div>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white rounded-2xl shadow-2xl w-[95%] h-[85%] flex flex-col p-6">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-xl font-black text-slate-800">名單數據庫</h3>
                    <p class="text-xs text-red-500 font-bold">規範：A單位 | B組別 | C員編 | D姓名 | E飲食 (請確保標題在第1列)</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('excel-upload').click()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700">選擇 Excel 檔案</button>
                    <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls"/>
                    <button onclick="addRow()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold text-sm border">＋ 手動新增</button>
                    <button onclick="closeDataModal()" class="px-4 py-2 bg-slate-800 text-white rounded-lg font-bold text-sm">確認並關閉</button>
                </div>
            </div>
            <div class="flex-1 overflow-auto border rounded-xl bg-slate-50">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-slate-200 sticky top-0 shadow-sm">
                        <tr>
                            <th class="p-3 border-b">單位</th>
                            <th class="p-3 border-b">組別</th>
                            <th class="p-3 border-b">員編</th>
                            <th class="p-3 border-b">姓名</th>
                            <th class="p-3 border-b">飲食</th>
                            <th class="p-3 border-b w-16 text-center">刪除</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="manage-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-96">
            <div class="flex justify-between items-center mb-4"><h3 class="font-black" id="modal-title">管理</h3><button onclick="closeManageModal()">✕</button></div>
            <div id="modal-content" class="space-y-3 mb-6"></div>
            <button onclick="closeManageModal()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">儲存</button>
        </div>
    </div>

    <script>
        let rawData = JSON.parse(localStorage.getItem('v9_1_raw')) || []; 
        let tables = JSON.parse(localStorage.getItem('v9_1_tables')) || [];
        let currentMode = 'normal', deptColors = {}, selectedDept = null, draggedTable = null, currentEditingTable = null;
        const ROWS = 15, COLS = 20, WALKWAY_COL = 11, COLORS = ["#4f46e5", "#e11d48", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4", "#f97316"];

        // --- 名單管理 ---
        function renderDataTable() {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            rawData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-1 border"><input class="w-full p-1" value="${item.dept||''}" onchange="updateData(${index}, 'dept', this.value)"></td>
                    <td class="p-1 border"><input class="w-full p-1" value="${item.group||''}" onchange="updateData(${index}, 'group', this.value)"></td>
                    <td class="p-1 border"><input class="w-full p-1 font-mono text-indigo-600" value="${item.id||''}" onchange="updateData(${index}, 'id', this.value)"></td>
                    <td class="p-1 border"><input class="w-full p-1" value="${item.name||''}" onchange="updateData(${index}, 'name', this.value)"></td>
                    <td class="p-1 border"><input class="w-full p-1" value="${item.diet||'葷'}" onchange="updateData(${index}, 'diet', this.value)"></td>
                    <td class="p-1 border text-center"><button onclick="deleteRow(${index})" class="text-red-400">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
        }
        function updateData(idx, key, val) { rawData[idx][key] = val; save(); }
        function addRow() { rawData.unshift({ dept: '新單位', group: '', id: '', name: '', diet: '葷' }); renderDataTable(); save(); }
        function deleteRow(idx) { rawData.splice(idx, 1); renderDataTable(); save(); }
        function openDataModal() { document.getElementById('data-modal').classList.remove('hidden'); renderDataTable(); }
        function closeDataModal() { document.getElementById('data-modal').classList.add('hidden'); renderCanvas(); }

        // --- 核心繪製邏輯 (同前版) ---
        function getStats() {
            let s = {};
            rawData.forEach(d => {
                if(!s[d.dept]) s[d.dept] = { total: 0, veg: 0 };
                s[d.dept].total++;
                if(String(d.diet).includes('素')) s[d.dept].veg++;
            });
            return s;
        }
        function getRemain(dName) {
            const s = getStats()[dName];
            let assigned = 0;
            tables.forEach(t => (t.assigned || []).forEach(a => { if(a.dept === dName) assigned += a.count; }));
            return (s ? s.total : 0) - assigned;
        }
        function renderCanvas() {
            tables.sort((a,b)=>a.r!==b.r?a.r-b.r:a.c-b.c);
            let n=1, m=1; tables.forEach(t=>{t.displayId=t.type==='main'?`M${m++}`:n++; t.capacity=t.type==='main'?12:10;});
            const canvas = document.getElementById('canvas'); canvas.innerHTML = '';
            for(let r=1; r<=ROWS; r++){
                for(let c=1; c<=COLS; c++){
                    const cell = document.createElement('div');
                    cell.className = `grid-cell rounded-full flex items-center justify-center relative ${c===WALKWAY_COL?'walkway-bg':''}`;
                    const table = tables.find(t=>t.r===r && t.c===c);
                    if(table){
                        const total = (table.assigned||[]).reduce((s,a)=>s+a.count,0);
                        const veg = (table.assigned||[]).reduce((s,a)=>s+(a.veg||0),0);
                        let sc = total > table.capacity ? 'status-over' : (total === table.capacity ? 'status-full' : (total>0?'status-partial':''));
                        const tableEl = document.createElement('div');
                        tableEl.draggable = true;
                        tableEl.className = `w-14 h-14 rounded-full shadow-lg flex flex-col items-center justify-center text-white transition-all ${sc}`;
                        tableEl.style.backgroundColor = table.themeColor || (table.type==='main'?'#fbbf24':'#6366f1');
                        tableEl.innerHTML = `<div class="text-[9px] font-black">${table.displayId}</div>`;
                        (table.assigned||[]).slice(0,2).forEach(a=>{ tableEl.innerHTML += `<div class="text-[8px] font-bold">${a.dept.substring(0,2)}${a.count}</div>`; });
                        if(veg>0) tableEl.innerHTML += `<div class="text-[7px] bg-green-500/50 px-1 rounded">素:${veg}</div>`;
                        tableEl.onclick=(e)=>{e.stopPropagation(); if(selectedDept) assignToTable(table); else openManageModal(table);};
                        tableEl.oncontextmenu=(e)=>{e.preventDefault(); if(confirm('刪除？')){tables=tables.filter(t=>t!==table); renderCanvas();}};
                        tableEl.ondragstart=()=>{draggedTable=table; tableEl.style.opacity="0.3";};
                        tableEl.ondragend=()=>{draggedTable=null; renderCanvas();};
                        cell.appendChild(tableEl);
                    } else {
                        cell.className += " border border-dashed border-slate-200 hover:bg-indigo-50 cursor-pointer";
                        cell.onclick=()=>{tables.push({r,c,type:currentMode,assigned:[],themeColor:null}); renderCanvas();};
                        cell.ondragover=(e)=>e.preventDefault();
                        cell.ondrop=()=>{if(draggedTable){draggedTable.r=r; draggedTable.c=c; renderCanvas();}};
                    }
                    canvas.appendChild(cell);
                }
            }
            renderSidebar(); save();
        }
        function renderSidebar() {
            const list = document.getElementById('dept-list'), s = getStats();
            list.innerHTML = ''; let vT=0; Object.values(s).forEach(x=>vT+=x.veg);
            document.getElementById('veg-total-info').innerText = `總素食: ${vT}`;
            Object.keys(s).forEach((d,i)=>{
                if(!deptColors[d]) deptColors[d]=COLORS[i%COLORS.length];
                const rem = getRemain(d), isSel = selectedDept===d;
                const div = document.createElement('div');
                div.className = `p-2 rounded cursor-pointer border mb-1 text-xs font-bold flex justify-between items-center ${isSel?'bg-slate-800 text-white scale-105':'bg-white'}`;
                div.style.borderLeft = `4px solid ${deptColors[d]}`;
                div.innerHTML = `<span>${d} <span class="opacity-50 text-[9px]">(${s[d].veg}素)</span></span><span class="${rem<0?'text-red-500':''}">${rem}人</span>`;
                div.onclick=()=>{selectedDept=isSel?null:d; renderSidebar();};
                list.appendChild(div);
            });
        }
        function assignToTable(t){
            const r = getRemain(selectedDept);
            const c = prompt(`分配 [${selectedDept}] 剩餘:${r}人，輸入人數:`, Math.max(0,r));
            if(parseInt(c)>0){
                const v = prompt(`其中幾位素食？`,"0");
                t.assigned.push({dept:selectedDept, count:parseInt(c), veg:parseInt(v)||0});
                if(!t.themeColor) t.themeColor = deptColors[selectedDept];
                selectedDept=null; renderCanvas();
            }
        }
        function openManageModal(t){
            currentEditingTable = t;
            const c = document.getElementById('modal-content'); c.innerHTML = '';
            t.assigned.forEach((a,i)=>{
                const d = document.createElement('div'); d.className="p-2 bg-slate-50 border rounded text-xs flex items-center gap-2";
                d.innerHTML = `<b>${a.dept}</b> 總:<input type="number" value="${a.count}" class="w-10 border" onchange="currentEditingTable.assigned[${i}].count=parseInt(this.value)"> 素:<input type="number" value="${a.veg||0}" class="w-10 border" onchange="currentEditingTable.assigned[${i}].veg=parseInt(this.value)"> <button onclick="currentEditingTable.assigned.splice(${i},1);openManageModal(currentEditingTable)" class="text-red-400 ml-auto">✕</button>`;
                c.appendChild(d);
            });
            document.getElementById('manage-modal').classList.remove('hidden');
        }
        function closeManageModal(){ document.getElementById('manage-modal').classList.add('hidden'); renderCanvas(); }
        function save(){ localStorage.setItem('v9_1_raw', JSON.stringify(rawData)); localStorage.setItem('v9_1_tables', JSON.stringify(tables)); }
        function setMode(m){ currentMode=m; renderCanvas(); }

        // --- 強力 Excel 匯入邏輯 (修正位置讀取) ---
        document.getElementById('excel-upload').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    // 抓取第一個工作表
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    // 將表格轉為二維陣列 (比較好抓 A,B,C,D,E)
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                    
                    if(rows.length < 2) {
                        alert("Excel 檔案內容太少，請確保至少有標題與一行資料！");
                        return;
                    }

                    const newData = [];
                    // 從第二行開始讀 (index 1)
                    for(let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if(!row || row.length === 0) continue; 
                        
                        newData.push({
                            dept:  String(row[0] || '未分類'), // A 單位
                            group: String(row[1] || ''),     // B 組別
                            id:    String(row[2] || ''),     // C 員編
                            name:  String(row[3] || ''),     // D 姓名
                            diet:  String(row[4] || '葷')    // E 飲食
                        });
                    }

                    if(newData.length > 0) {
                        rawData = [...newData, ...rawData];
                        save();
                        renderDataTable();
                        alert(`成功匯入 ${newData.length} 筆資料！`);
                    } else {
                        alert("讀取不到任何資料，請檢查 Excel A~E 欄是否有填寫內容。");
                    }
                } catch (err) {
                    console.error(err);
                    alert("匯入失敗：檔案格式可能不支援，請使用標準 .xlsx 格式。");
                }
            };
            reader.readAsArrayBuffer(file);
        };

        renderCanvas();
    </script>
</body>
</html>
