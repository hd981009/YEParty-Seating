<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾牙排座系統 - 場地配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .main-walkway { margin-right: 60px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, minmax(60px, 1fr));
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-100 p-8 font-sans min-h-screen relative">

    <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">尾牙排座系統 - 場地配置預覽</h1>
    
    <div class="w-full h-12 bg-red-600 text-white flex items-center justify-center mb-12 rounded shadow-lg max-w-5xl mx-auto">
        STAGE 舞台
    </div>

    <div id="grid-container" class="grid-container max-w-6xl mx-auto">
        </div>

    <div class="fixed bottom-10 left-10 flex flex-col items-start gap-3">
        <div id="status-tip" class="hidden bg-black text-white text-xs p-2 rounded animate-bounce">
            請點選灰色虛線區域新增桌子
        </div>
        <button id="add-btn" class="p-4 rounded-full shadow-2xl bg-white text-blue-600 hover:bg-blue-50 border border-gray-200 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <script>
        const ROWS = 9;
        const COLS = 12;
        const MAIN_WALKWAY_AFTER = 6;
        let isAddMode = false;
        
        // 初始桌位資料 (主桌在第一排中間)
        let tables = [];
        for (let r = 1; r <= ROWS; r++) {
            for (let c = 1; c <= COLS; c++) {
                if (r === 1 && (c === 6 || c === 7)) {
                    if (c === 6) tables.push({ id: 'Main', r, c, isMain: true });
                } else {
                    tables.push({ id: `${r}-${c}`, r, c, isMain: false });
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const table = tables.find(t => (t.r === r && t.c === c));
                    const cell = document.createElement('div');
                    
                    // 基礎樣式
                    cell.className = `relative h-20 w-20 rounded-full flex items-center justify-center transition-all cursor-pointer `;
                    if (c === MAIN_WALKWAY_AFTER) cell.classList.add('main-walkway');

                    if (table) {
                        if (table.isMain) {
                            cell.className += "bg-yellow-500 scale-125 z-10 shadow-lg text-white font-bold";
                            cell.innerText = "主桌";
                        } else {
                            cell.className += "bg-blue-500 shadow-md text-white text-xs font-bold";
                            cell.innerText = `桌 ${r}-${c}`;
                        }
                    } else {
                        cell.className += `border-2 border-dashed border-gray-300 hover:bg-gray-200`;
                        if (isAddMode) cell.classList.add('animate-pulse');
                        cell.onclick = () => addTable(r, c);
                    }
                    container.appendChild(cell);
                }
            }
        }

        function addTable(r, c) {
            if (!isAddMode) return;
            tables.push({ id: `New-${r}-${c}`, r, c, isMain: false });
            isAddMode = false;
            document.getElementById('status-tip').classList.add('hidden');
            renderGrid();
        }

        document.getElementById('add-btn').onclick = () => {
            isAddMode = !isAddMode;
            document.getElementById('status-tip').classList.toggle('hidden', !isAddMode);
            renderGrid();
        };

        renderGrid();
    </script>
</body>
</html>
